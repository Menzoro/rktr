<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#080810">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="RKTR">
<title>RKTR</title>
<link rel="manifest" href="manifest.json">
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
button, .tbn, .step-btn, .sm-len, .sm-btn, .rec-mode-btn, .inst-mute, .inst-rec {
  touch-action: manipulation;
}
:root{
  --bg:#080810;
  --s1:#10101a;
  --s2:#18182a;
  --s3:#22223a;
  --border:#2a2a40;
  --text:#d8d8f0;
  --muted:#55556a;
  --accent:#00e5c8;
  --kick:#ff5e2a;
  --snare:#8b78ff;
  --hat:#ffe040;
  --hihat:#ffe040;
  --tom:#2dffa0;
}
html{
  height:100%;
  height:-webkit-fill-available;
  width:100%;
  overflow:hidden;
}
body{
  height:100%;
  height:-webkit-fill-available;
  width:100%;
  overflow:hidden;
  background:var(--bg);
  color:var(--text);
  font-family:'JetBrains Mono', 'Courier New', Courier, monospace;
  font-size:13px;
}
#app{
  display:flex;
  flex-direction:column;
  height:100%;
  height:100dvh;
  width:100%;
  overflow:hidden;
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
}

/* ── TOP BAR ── */
#topbar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:3px 10px;
  background:var(--s1);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  flex-wrap:nowrap;
  min-height:0;
}
.logo{
  font-size:14px;
  font-weight:700;
  letter-spacing:0.18em;
  color:var(--accent);
  white-space:nowrap;
}
.logo span{color:var(--muted);font-weight:400;font-size:9px;letter-spacing:0.05em;margin-left:5px;}
.topbar-group{display:flex;align-items:center;gap:5px;}
.topbar-label{font-size:9px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;}
.spacer{flex:1;}

/* BPM */
#bpm-display{
  font-size:16px;font-weight:700;color:var(--accent);
  min-width:34px;text-align:center;
  cursor:pointer;
  border-bottom:1px solid var(--border);
  padding:0 2px;
}
.top-slider{width:70px;accent-color:var(--accent);cursor:pointer;}

/* ── GEAR DROPDOWN ── */
#gear-wrap{
  position:relative;
}
#gear-btn{
  font-size:13px;
  padding:4px 8px;
}
#gear-menu{
  display:none;
  position:absolute;
  top:calc(100% + 6px);
  right:0;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:6px;
  min-width:160px;
  padding:6px;
  z-index:1000;
  box-shadow:0 6px 24px rgba(0,0,0,0.5);
  flex-direction:column;
  gap:2px;
}
#gear-menu.open{display:flex;}
.gear-item{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:7px 10px;
  border-radius:4px;
  cursor:pointer;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--text);
  transition:background 0.1s;
  touch-action:manipulation;
}
.gear-item:hover{background:var(--s2);}
.gear-toggle{
  width:28px;height:14px;
  border-radius:7px;
  background:var(--s3);
  border:1px solid var(--border);
  position:relative;
  transition:background 0.15s, border-color 0.15s;
  flex-shrink:0;
}
.gear-toggle::after{
  content:'';
  position:absolute;
  top:2px;left:2px;
  width:8px;height:8px;
  border-radius:50%;
  background:var(--muted);
  transition:transform 0.15s, background 0.15s;
}
.gear-toggle.active{
  background:rgba(0,229,200,0.2);
  border-color:var(--accent);
}
.gear-toggle.active::after{
  transform:translateX(14px);
  background:var(--accent);
}
.gear-divider{
  height:1px;
  background:var(--border);
  margin:4px 0;
}

/* Steps */
.step-btn{
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  padding:4px 7px;
  cursor:pointer;
  border-radius:3px;
  transition:all 0.12s;
}
.step-btn.active{background:var(--s3);color:var(--accent);border-color:var(--accent);}
.step-btn:active{transform:scale(0.93);}

/* Transport buttons */
.tbn{
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;
  padding:5px 10px;
  cursor:pointer;
  border-radius:3px;
  letter-spacing:0.08em;
  transition:all 0.12s;
  white-space:nowrap;
}
.tbn:active{transform:scale(0.93);}
.tbn.active{background:var(--accent);color:#000;border-color:var(--accent);}
.tbn.warn{border-color:var(--kick);position:relative;overflow:hidden;}
#clr-fill{
  position:absolute;
  top:0;left:0;bottom:0;
  width:0%;
  background:var(--kick);
  opacity:0.35;
  pointer-events:none;
  transition:none;
}

#swing-val{color:var(--accent);font-weight:700;font-size:10px;min-width:20px;}

/* ── BANDS ── */
#bands{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:3px;
  padding:6px;
  overflow:hidden;
  min-height:0;
}
.band-row{
  display:flex;
  gap:5px;
  flex:1;
  min-height:0;
  align-items:stretch;
}
.band-rec-col{
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  width:58px;
}
.band-label{
  width:58px;
  position:relative;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-end;
  gap:0;
  border-radius:4px;
  border:1px solid var(--border);
  padding:0;
  flex-shrink:0;
  overflow:hidden;
  background:var(--s2);
  cursor:pointer;
  transition:border-color 0.15s;
  touch-action: none;
}
.band-label.selected{border-color:currentColor;}
.band-label .vol-fill{
  position:absolute;
  bottom:0;left:0;right:0;
  transition:height 0.08s;
  opacity:0.18;
  pointer-events:none;
}
.band-label .inst-name{
  position:relative;
  font-size:7px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  padding:2px 0 1px;
  z-index:1;
}
.band-label.muted-swipe{
  opacity:0.35;
}
.band-label.muted-swipe .inst-name{
  text-decoration: line-through;
}
.band-label .inst-yparam{
  position:relative;
  font-size:6px;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  opacity:0.9;
  z-index:1;
  text-align:center;
  line-height:1.2;
  padding:0 2px;
}
.band-label .vol-slider{
  position:absolute;
  left:50%;
  top:4px;
  bottom:22px;
  width:28px;
  transform:translateX(-50%) rotate(180deg);
  writing-mode:vertical-lr;
  -webkit-appearance:none;
  appearance:none;
  background:transparent;
  cursor:ns-resize;
  z-index:2;
  opacity:0;
}
.band-label:hover .vol-slider{ opacity:1; }
.band-wrap{
  flex:1;
  position:relative;
  border-radius:5px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--s1);
  cursor:crosshair;
  min-width:0;
}
canvas.band-cv{display:block;width:100%;height:100%;touch-action:none;}

/* ── SYNTH TOGGLE BAR ── */
#synth-toggle-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:5px 12px;
  background:var(--s1);
  border-top:1px solid var(--border);
  cursor:pointer;
  flex-shrink:0;
  transition:background 0.15s;
}
#synth-toggle-bar.hidden{ display:none; }
#synth-toggle-bar:hover{background:var(--s2);}
.stb-left{display:flex;align-items:center;gap:8px;}
.stb-inst-name{font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;}
.stb-hint{font-size:9px;color:var(--muted);}
.stb-arrow{font-size:10px;color:var(--muted);transition:transform 0.25s;}
.stb-arrow.open{transform:rotate(180deg);}

/* ── SYNTH CLOSE BUTTON (inside panel) ── */
#synth-close-btn{
  background:none;
  border:1px solid var(--border);
  border-radius:3px;
  color:var(--muted);
  font-size:11px;
  padding:2px 7px;
  cursor:pointer;
  flex-shrink:0;
  touch-action:manipulation;
  transition:color 0.12s, border-color 0.12s;
}
#synth-close-btn:active{ color:var(--text); border-color:var(--muted); }

/* ── SYNTH PANEL ── */
#synth-panel{
  background:var(--s1);
  border-top:1px solid var(--border);
  flex-shrink:0;
  overflow:hidden;
  max-height:0;
  transition:max-height 0.28s ease;
}
#synth-panel.open{max-height:260px;}
#synth-inner{
  padding:10px 12px 12px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.synth-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;}
.param{display:flex;flex-direction:column;gap:2px;min-width:72px;flex:1;}
.param-header{display:flex;align-items:baseline;justify-content:space-between;gap:4px;}
.param label{font-size:8px;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;}
.param input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;margin:0;}
.param .pval{font-size:9px;color:var(--text);font-weight:700;}
.synth-actions{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.prev-btn{
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--text);
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  padding:5px 10px;
  cursor:pointer;
  border-radius:3px;
  letter-spacing:0.08em;
  white-space:nowrap;
}
.prev-btn:active{transform:scale(0.93);}
.prev-btn.auto-active{background:var(--accent);color:#000;border-color:var(--accent);}
.preset-btn{
  background:var(--s2);
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  padding:3px 8px;
  cursor:pointer;
  border-radius:3px;
  letter-spacing:0.06em;
  transition:all 0.12s;
}
.preset-btn:hover{color:var(--text);border-color:var(--muted);}
.preset-btn:active{transform:scale(0.93);background:var(--s3);}

/* ── STEP INDICATOR (bottom) ── */
#step-indicator{
  height:3px;
  background:var(--s2);
  flex-shrink:0;
  position:relative;
  overflow:hidden;
}
#step-cursor{
  position:absolute;
  top:0;height:100%;
  width:4%;
  background:var(--accent);
  transition:left 0.05s linear;
  border-radius:1px;
}

/* ── Y-PARAM PICKER ── */
#yparam-picker{
  position:fixed;
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:6px;
  padding:6px;
  z-index:999;
  display:none;
  flex-direction:column;
  gap:3px;
  min-width:110px;
  box-shadow:0 4px 20px rgba(0,0,0,0.6);
}
#yparam-picker.visible{display:flex;}
.yparam-opt{
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  padding:4px 8px;
  cursor:pointer;
  border-radius:3px;
  color:var(--muted);
  letter-spacing:0.08em;
  text-transform:uppercase;
  border:1px solid transparent;
  transition:all 0.1s;
}
.yparam-opt:hover{color:var(--text);background:var(--s2);}
.yparam-opt.active{color:var(--accent);border-color:var(--accent);}
.yparam-label{
  font-size:8px;
  color:var(--muted);
  padding:2px 8px 4px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  border-bottom:1px solid var(--border);
  margin-bottom:2px;
}

/* ── MASTER FX PEDALS ── */
.fx-pedal{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:8px;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  /* All pedals same height — driven by grid row alignment */
}
.fx-pedal-title{
  background:var(--pedal);
  color:#000;
  font-size:9px;
  font-weight:700;
  letter-spacing:0.14em;
  text-transform:uppercase;
  padding:5px 10px;
  flex-shrink:0;
}
.fx-pedal-body{
  padding:0;
  display:flex;
  flex-direction:column;
  flex:1;
  min-height:0;
}
.fx-pedal-top{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
  padding:8px 10px;
}
.fx-pedal-divider{
  height:1px;
  background:var(--border);
  flex-shrink:0;
}
.fx-pedal-bottom{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:6px;
  padding:8px 10px;
}
.fx-param-row{
  display:flex;
  align-items:center;
  gap:6px;
  min-width:0;
}
.fx-param-row label{
  font-size:8px;
  color:var(--muted);
  letter-spacing:0.1em;
  text-transform:uppercase;
  white-space:nowrap;
  width:48px;
  flex-shrink:0;
}
.fx-slider{
  flex:1;
  min-width:0;
  max-width:100%;
  accent-color:var(--pedal,var(--accent));
  cursor:pointer;
}
.fx-val{
  font-size:9px;
  font-weight:700;
  color:var(--text);
  min-width:30px;
  text-align:right;
}
.fx-time-btn{
  background:var(--s3);
  border:1px solid var(--border);
  color:var(--muted);
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  padding:3px 6px;
  cursor:pointer;
  border-radius:3px;
  transition:all 0.12s;
  touch-action:manipulation;
}
.fx-time-btn.active{
  background:var(--pedal,var(--accent));
  color:#000;
  border-color:var(--pedal,var(--accent));
}

/* Vertical EQ sliders */
.eq-band{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  flex:1;
}
.eq-vslider{
  writing-mode:vertical-lr;
  direction:rtl;
  -webkit-appearance:slider-vertical;
  appearance:slider-vertical;
  width:28px;
  height:60px;
  accent-color:var(--pedal,var(--accent));
  cursor:pointer;
  flex-shrink:0;
}
.eq-label{
  font-size:8px;
  font-weight:700;
  color:var(--text);
  min-width:28px;
  text-align:center;
}
.eq-band-label{
  font-size:7px;
  color:var(--muted);
  letter-spacing:0.1em;
  text-transform:uppercase;
  text-align:center;
}

/* Scrollbar hide */
::-webkit-scrollbar{display:none;}

/* ── SAMPLE MODAL ── */
#sample-modal{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.82);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
}
#sample-modal.visible{display:flex;}
#sample-box{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:10px;
  padding:18px;
  width:min(340px,92vw);
  display:flex;
  flex-direction:column;
  gap:12px;
  position:relative;
  overflow:hidden;
}
#sample-box .sm-title{
  font-size:11px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;
}
#sample-box .sm-lengths{
  display:flex;gap:6px;flex-wrap:wrap;
}
.sm-len{
  background:var(--s2);border:1px solid var(--border);
  color:var(--muted);font-family:'JetBrains Mono',monospace;
  font-size:10px;padding:5px 10px;cursor:pointer;border-radius:3px;
  transition:all 0.12s;
}
.sm-len.active{background:var(--s3);color:var(--accent);border-color:var(--accent);}
.sm-len:active{transform:scale(0.93);}
#sample-canvas-wrap{
  position:relative;
  width:100%;
  border-radius:4px;
  overflow:hidden;
  border:1px solid var(--border);
  background:var(--s2);
}
#sample-canvas{
  width:100%;height:80px;display:block;
}
#sample-progress-bar{
  position:absolute;
  bottom:0;left:0;height:3px;
  background:var(--accent);
  width:0%;
  transition:none;
}

/* ── RECORD BUTTON ── */
#sample-rec-btn{
  width:100%;padding:14px;border-radius:6px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;
  letter-spacing:0.12em;text-transform:uppercase;border:2px solid var(--border);
  background:var(--s3);color:var(--text);transition:background 0.15s, border-color 0.15s;
  touch-action:manipulation;
}
#sample-rec-btn.preroll{
  border-color:var(--muted);color:var(--muted);
}
#sample-rec-btn.recording{
  background:#8b0000;color:#ff6060;border-color:#e03030;
  animation:pulse-rec 1s ease-in-out infinite alternate;
}
@keyframes pulse-rec{
  from{border-color:#e03030;}
  to{border-color:#ff6060;}
}

#sample-timer{
  font-family:'JetBrains Mono',monospace;
}
.sm-actions{display:flex;gap:8px;}
.sm-btn{
  flex:1;padding:8px;border-radius:4px;cursor:pointer;
  font-family:'JetBrains Mono',monospace;font-size:10px;
  font-weight:700;letter-spacing:0.1em;text-transform:uppercase;
  border:1px solid var(--border);background:var(--s2);color:var(--text);
  transition:all 0.12s;touch-action:manipulation;
}
.sm-btn.confirm{background:var(--accent);color:#000;border-color:var(--accent);}
.sm-btn:active{transform:scale(0.95);}
.sm-btn:disabled{opacity:0.35;cursor:default;}
.inst-rec{
  position:relative;font-size:10px;font-weight:700;
  letter-spacing:0.08em;text-transform:uppercase;
  color:var(--muted);cursor:pointer;border:1px solid var(--border);
  border-radius:4px;padding:0;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  background:var(--s2);z-index:1;transition:all 0.12s;
  touch-action:manipulation;
}
.inst-rec.sampled{color:var(--accent);border-color:var(--accent);}
.rec-mode-btn{
  padding:4px 10px;
  font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;
  letter-spacing:0.1em;text-transform:uppercase;
  border:none;background:var(--s2);color:var(--muted);
  cursor:pointer;transition:all 0.12s;touch-action:manipulation;
}
.rec-mode-btn.active{background:var(--s3);color:var(--accent);}
.rec-mode-btn:not(:last-child){border-right:1px solid var(--border);}
.inst-rec.live-recording{
  color:#fff;
  background:#e03030;
  border-color:#e03030;
  animation:pulse-rec-btn 0.5s ease-in-out infinite alternate;
}
@keyframes pulse-rec-btn{
  from{box-shadow:0 0 0 0 rgba(224,48,48,0.6);}
  to{box-shadow:0 0 0 5px rgba(224,48,48,0);}
}
.inst-rec:active{transform:scale(0.9);}
#sm-rec-tint{
  position:absolute;top:0;bottom:0;left:50%;
  width:50%;
  background:rgba(0,229,200,0.04);
  pointer-events:none;
}
#sm-center-line{
  position:absolute;top:0;bottom:0;left:50%;
  width:2px;margin-left:-1px;
  background:rgba(0,229,200,0.35);
  pointer-events:none;
}
#sm-playhead{
  position:absolute;top:0;bottom:0;left:0;
  width:2px;
  background:rgba(255,255,255,0.7);
  box-shadow:0 0 6px rgba(255,255,255,0.4);
  pointer-events:none;
  transition:background 0.2s;
}
#sm-playhead.in-rec{
  background:#e03030;
  box-shadow:0 0 8px rgba(224,48,48,0.6);
}
#sm-label-pre, #sm-label-rec{
  position:absolute;top:5px;
  font-family:'JetBrains Mono',monospace;
  font-size:8px;font-weight:700;letter-spacing:0.14em;
  text-transform:uppercase;pointer-events:none;
  opacity:0.5;
}
#sm-label-pre{ left:8px; color:var(--muted); }

</style>
</head>
<body>

<script>
// ═══════════════════════════════════════════════════════════════════
// MODULE: AUDIO CONTEXT & SHARED STATE
// Owns: AudioContext, masterGain, transport globals, instrument list,
//       notes array, mute flags, and per-instrument runtime state.
// Future split: audio-context.js + state.js  (or a single store.js)
// ═══════════════════════════════════════════════════════════════════

const AC = new (window.AudioContext || window.webkitAudioContext)();
const masterGain = AC.createGain();
masterGain.gain.value = 0.85;
masterGain.connect(AC.destination);

function resumeAC() { if (AC.state === 'suspended') AC.resume(); }
document.addEventListener('click', resumeAC);
document.addEventListener('touchstart', resumeAC, { passive: true });

// ── Monitor ducking (for live hold-to-record) ──────────────────────
// Smoothly drops the master output to DUCK_GAIN while recording so the
// backing beat is audible as a soft guide but doesn't bleed into the mic.
const DUCK_GAIN   = 0.05;
const DUCK_RAMP   = 0.03;   // seconds to ramp down — fast, exponential
const UNDUCK_RAMP = 0.18;   // seconds to ramp back up
let   duckCount   = 0;      // ref-count so overlapping recordings don't fight

function duckMaster() {
  duckCount++;
  if (duckCount === 1) {
    masterGain.gain.cancelScheduledValues(AC.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value, AC.currentTime);
    masterGain.gain.exponentialRampToValueAtTime(DUCK_GAIN, AC.currentTime + DUCK_RAMP);
  }
}
function unduckMaster() {
  duckCount = Math.max(0, duckCount - 1);
  if (duckCount === 0) {
    masterGain.gain.cancelScheduledValues(AC.currentTime);
    masterGain.gain.setValueAtTime(masterGain.gain.value, AC.currentTime);
    masterGain.gain.exponentialRampToValueAtTime(0.85, AC.currentTime + UNDUCK_RAMP);
  }
}

// ── Master FX chain ────────────────────────────────────────────────
// Signal flow: masterGain → masterComp → masterDelayDry
//                                      → masterReverb → AC.destination
// Shared delay: instruments send into it per-note via delaySend gain nodes.
// masterGain no longer connects directly to destination — chain does.

const masterFXP = {
  delayTime:     '1/4',
  delayFeedback: 0.35,
  delayMix:      0.4,
  reverbWet:     0,      // off by default — no FX on load
  reverbType:    'room',
  reverbDecay:   0.5,
  comp:          'off',
  compThresh:    -12,
  eqLow:         0,
  eqMid:         0,
  eqHigh:        0,
  volume:        0.85,
};

// Master-bus compression presets — gentler than per-track settings
const MASTER_COMP_PRESETS = {
  off:   { threshold:  0, ratio:  1,   knee:  0, attack: 0.010, release: 0.20 },
  glue:  { threshold:-12, ratio:  2,   knee: 10, attack: 0.010, release: 0.20 }, // transparent glue
  limit: { threshold: -6, ratio: 10,   knee:  2, attack: 0.001, release: 0.10 }, // soft limiter
};

// Delay time options — steps of 1/16 note each
// 2 rows × 3 cols: 1/16, 1/8, 1/4 / dotted-1/8, 3/8, 1/2
const DELAY_TIMES = { '1/16':1, '1/8':2, '1/4':4, 'd1/8':3, '3/8':6, '1/2':8 };

// Nodes — built at init, referenced globally
let masterComp, masterDelayNode, masterDelayFeedback, masterDelayWet,
    masterDelayDry, masterReverbConv, masterReverbWet, masterReverbDry,
    masterEqLow, masterEqMid, masterEqHigh, masterOut;

function buildMasterChain() {
  // Master compressor — first in chain after masterGain
  masterComp = AC.createDynamicsCompressor();
  const cp = MASTER_COMP_PRESETS[masterFXP.comp] || MASTER_COMP_PRESETS.off;
  masterComp.threshold.value = cp.threshold;
  masterComp.ratio.value     = cp.ratio;
  masterComp.knee.value      = cp.knee;
  masterComp.attack.value    = cp.attack;
  masterComp.release.value   = cp.release;

  // Master 3-band EQ
  masterEqLow  = AC.createBiquadFilter();
  masterEqLow.type = 'lowshelf'; masterEqLow.frequency.value = 200;
  masterEqLow.gain.value = masterFXP.eqLow;

  masterEqMid  = AC.createBiquadFilter();
  masterEqMid.type = 'peaking'; masterEqMid.frequency.value = 1000; masterEqMid.Q.value = 1;
  masterEqMid.gain.value = masterFXP.eqMid;

  masterEqHigh = AC.createBiquadFilter();
  masterEqHigh.type = 'highshelf'; masterEqHigh.frequency.value = 6000;
  masterEqHigh.gain.value = masterFXP.eqHigh;

  // Shared delay (max 4s buffer)
  masterDelayNode     = AC.createDelay(4.0);
  masterDelayFeedback = AC.createGain();
  masterDelayWet      = AC.createGain();
  masterDelayDry      = AC.createGain();
  // Delay time set lazily — stepDur() is valid here since bpm is already set
  masterDelayNode.delayTime.value = (DELAY_TIMES[masterFXP.delayTime] || 4) * stepDur();
  masterDelayFeedback.gain.value  = masterFXP.delayFeedback;
  masterDelayWet.gain.value       = masterFXP.delayMix;
  masterDelayDry.gain.value       = 1;

  // Master reverb — use IR if available, otherwise convolver stays silent (safe)
  masterReverbConv = AC.createConvolver();
  const ir = getIR(masterFXP.reverbType);
  if (ir) masterReverbConv.buffer = ir;
  masterReverbWet  = AC.createGain();
  masterReverbDry  = AC.createGain();
  masterReverbWet.gain.value = masterFXP.reverbWet;
  masterReverbDry.gain.value = 1;

  // Final output — volume controlled here
  masterOut = AC.createGain();
  masterOut.gain.value = masterFXP.volume;
  masterOut.connect(AC.destination);

  // ── Routing ──────────────────────────────────────────────────────
  // masterGain → masterComp → masterDelayDry → masterReverbDry → masterOut
  //                                                             → masterReverbConv → masterReverbWet → masterOut
  // masterDelayNode (fed by per-note sends) → feedback loop
  //                                         → masterDelayWet → masterReverbDry

  masterGain.connect(masterComp);
  masterComp.connect(masterEqLow);
  masterEqLow.connect(masterEqMid);
  masterEqMid.connect(masterEqHigh);
  masterEqHigh.connect(masterDelayDry);
  masterDelayDry.connect(masterReverbDry);
  masterReverbDry.connect(masterOut);
  masterReverbDry.connect(masterReverbConv);
  masterReverbConv.connect(masterReverbWet);
  masterReverbWet.connect(masterOut);

  // Delay: per-note sends → delayNode → feedback → delayNode (loop)
  //                                   → delayWet → reverbDry (joins main path)
  masterDelayNode.connect(masterDelayFeedback);
  masterDelayFeedback.connect(masterDelayNode);
  masterDelayNode.connect(masterDelayWet);
  masterDelayWet.connect(masterReverbDry);

  // NOTE: disconnect masterGain from AC.destination now that masterOut handles output.
  // This is necessary for the volume slider to reach true zero.
  try { masterGain.disconnect(AC.destination); } catch(e) {}
}

// Per-note delay send — called by triggerInst/playSample for armed notes
// Returns a GainNode connected to masterDelayNode that auto-disconnects after playDur
function makeDelaySend(sendLevel, t, playDur) {
  const send = AC.createGain();
  send.gain.value = sendLevel;
  send.connect(masterDelayNode);
  // Auto-disconnect after note ends to avoid node accumulation
  setTimeout(() => { try { send.disconnect(); } catch(e) {} },
    (t - AC.currentTime + playDur + 0.5) * 1000);
  return send;
}

function applyMasterFX() {
  if (!masterComp) return;
  const cp = MASTER_COMP_PRESETS[masterFXP.comp] || MASTER_COMP_PRESETS.off;
  // Threshold = preset base + user slider offset; off preset ignores slider
  const thresh = masterFXP.comp === 'off' ? 0 : masterFXP.compThresh;
  masterComp.threshold.value = thresh;
  masterComp.ratio.value     = cp.ratio;
  masterComp.knee.value      = cp.knee;
  masterComp.attack.value    = cp.attack;
  masterComp.release.value   = cp.release;
  masterEqLow.gain.setTargetAtTime(masterFXP.eqLow,  AC.currentTime, 0.01);
  masterEqMid.gain.setTargetAtTime(masterFXP.eqMid,  AC.currentTime, 0.01);
  masterEqHigh.gain.setTargetAtTime(masterFXP.eqHigh, AC.currentTime, 0.01);
  // Volume: allow true zero (mute)
  masterOut.gain.setTargetAtTime(Math.max(0, masterFXP.volume), AC.currentTime, 0.01);
  const steps16 = DELAY_TIMES[masterFXP.delayTime] || 4;
  masterDelayNode.delayTime.setTargetAtTime(steps16 * stepDur(), AC.currentTime, 0.01);
  masterDelayFeedback.gain.setTargetAtTime(masterFXP.delayFeedback, AC.currentTime, 0.01);
  masterDelayWet.gain.setTargetAtTime(masterFXP.delayMix, AC.currentTime, 0.01);
  masterReverbWet.gain.setTargetAtTime(masterFXP.reverbWet, AC.currentTime, 0.01);
  // Rebuild IR with new decay and re-assign — cheap enough to do on slider change
  const decay = 1.0 + masterFXP.reverbDecay * 3.0; // maps 0–1 → decay 1.0–4.0
  const newIR = makeImpulse(masterFXP.reverbType, decay);
  masterReverbConv.buffer = newIR;
}

// ── Transport ──────────────────────────────────────────────────────
let bpm    = 120;
let steps  = 16;
let swing  = 0;
let glowOn = true;
let autoPlayOnPlace = true;  // play sound when a note is placed on the grid
let isPlaying = false;
let quantOn   = false;    // reserved for future quantise-to-grid feature

// ── Distortion waveshaper factory ─────────────────────────────────
function mkDist(k) {
  const ws = AC.createWaveShaper();
  const n = 256, c = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = i * 2 / n - 1;
    if (k <= 1.0) {
      // Soft saturation (0–1)
      const amt = k * 200;
      c[i] = amt > 0 ? (3 + amt) * x * 20 * Math.PI / 180 / (Math.PI + amt * Math.abs(x)) : x;
    } else {
      // Blend from soft clip toward hard clip (1–1.5)
      const soft_amt = 200;
      const soft = (3 + soft_amt) * x * 20 * Math.PI / 180 / (Math.PI + soft_amt * Math.abs(x));
      const hard = Math.max(-1, Math.min(1, x * (1 + (k - 1) * 8)));
      const blend = (k - 1.0) / 0.5; // 0 at k=1, 1 at k=1.5
      c[i] = soft * (1 - blend) + hard * blend;
    }
  }
  ws.curve = c;
  return ws;
}

// ── Synth voice functions ──────────────────────────────────────────
function playKick(t, vel = 1, overrides = {}) {
  const p = { ...SP.kick, ...overrides };
  // Main body oscillator
  const g = AC.createGain();
  const vol = vel * (0.55 + p.body * 0.45);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + p.decay);
  const osc = AC.createOscillator();
  osc.type = 'sine';
  const startFreq = p.pitch + p.sweep * 22 * (0.5 + p.punch * 0.5);
  osc.frequency.setValueAtTime(startFreq, t);
  osc.frequency.exponentialRampToValueAtTime(p.pitch, t + 0.04 + p.sweep * 0.012);
  if (p.drive > 0.01) {
    const dist = mkDist(p.drive);
    osc.connect(dist); dist.connect(g);
  } else {
    osc.connect(g);
  }
  g.connect(masterGain);
  osc.start(t); osc.stop(t + p.decay + 0.15);
  // Punch transient
  if (p.punch > 0.05) {
    const cg = AC.createGain();
    cg.gain.setValueAtTime(vel * 0.25 * p.punch, t);
    cg.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    const ch = AC.createOscillator(); ch.type = 'sine'; ch.frequency.value = p.pitch * 1.5;
    ch.connect(cg); cg.connect(masterGain); ch.start(t); ch.stop(t + 0.06);
  }
  // Click layer — short noise burst for beater presence
  if (p.click > 0.02) {
    const cbuf = AC.createBuffer(1, Math.ceil(AC.sampleRate * 0.015), AC.sampleRate);
    const cd = cbuf.getChannelData(0);
    for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1) * (1 - i / cd.length);
    const csrc = AC.createBufferSource(); csrc.buffer = cbuf;
    const cg2 = AC.createGain();
    cg2.gain.setValueAtTime(vel * p.click * 0.6, t);
    cg2.gain.exponentialRampToValueAtTime(0.001, t + 0.015);
    const chpf = AC.createBiquadFilter(); chpf.type = 'highpass'; chpf.frequency.value = 2000;
    csrc.connect(chpf); chpf.connect(cg2); cg2.connect(masterGain); csrc.start(t);
  }
  // Sub layer — octave below for low-end weight
  if (p.sub > 0.02) {
    const sg = AC.createGain();
    sg.gain.setValueAtTime(vel * p.sub * 0.5, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t + p.decay * 1.2);
    const sosc = AC.createOscillator(); sosc.type = 'sine'; sosc.frequency.value = p.pitch * 0.5;
    sosc.connect(sg); sg.connect(masterGain); sosc.start(t); sosc.stop(t + p.decay * 1.2 + 0.1);
  }
}

function playSnare(t, vel = 1, overrides = {}) {
  const p = { ...SP.snare, ...overrides };
  // Noise layer
  const gn = AC.createGain();
  gn.gain.setValueAtTime(vel * p.noise * 0.6, t);
  gn.gain.exponentialRampToValueAtTime(0.001, t + p.decay);
  const buf = AC.createBuffer(1, Math.ceil(AC.sampleRate * 0.6), AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const ns = AC.createBufferSource(); ns.buffer = buf;
  const hpf = AC.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = p.pitch * 0.9;
  ns.connect(hpf); hpf.connect(gn); gn.connect(masterGain); ns.start(t);
  // Tone layer with pitch drop (tune)
  const gt = AC.createGain();
  gt.gain.setValueAtTime(vel * p.tone * 0.55, t);
  gt.gain.exponentialRampToValueAtTime(0.001, t + p.decay * 0.6);
  const osc = AC.createOscillator();
  osc.type = 'triangle';
  osc.frequency.setValueAtTime(p.pitch * (1 + p.tune * 0.5), t);
  osc.frequency.exponentialRampToValueAtTime(p.pitch, t + 0.03 + p.tune * 0.06);
  osc.connect(gt); gt.connect(masterGain);
  osc.start(t); osc.stop(t + p.decay);
  // Snap transient
  if (p.snap > 0.05) {
    const gs = AC.createGain();
    gs.gain.setValueAtTime(vel * p.snap * 0.4, t);
    gs.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
    const os2 = AC.createOscillator(); os2.type = 'square'; os2.frequency.value = p.pitch * 2.2;
    os2.connect(gs); gs.connect(masterGain); os2.start(t); os2.stop(t + 0.03);
  }
  // Crack — short high-pitched noise burst, rimshot-like attack
  if (p.crack > 0.02) {
    const cbuf = AC.createBuffer(1, Math.ceil(AC.sampleRate * 0.012), AC.sampleRate);
    const cd = cbuf.getChannelData(0);
    for (let i = 0; i < cd.length; i++) cd[i] = (Math.random() * 2 - 1) * (1 - i / cd.length);
    const csrc = AC.createBufferSource(); csrc.buffer = cbuf;
    const cg = AC.createGain();
    cg.gain.setValueAtTime(vel * p.crack * 0.7, t);
    cg.gain.exponentialRampToValueAtTime(0.001, t + 0.012);
    const cbpf = AC.createBiquadFilter(); cbpf.type = 'bandpass'; cbpf.frequency.value = p.pitch * 3; cbpf.Q.value = 2;
    csrc.connect(cbpf); cbpf.connect(cg); cg.connect(masterGain); csrc.start(t);
  }
}

function playHihat(t, vel = 1, open = false, overrides = {}) {
  const p = { ...SP.hihat, ...overrides };
  const dec = open ? p.opendec : p.decay;
  const atk = p.attack || 0.005;
  const g = AC.createGain();
  g.gain.setValueAtTime(atk > 0.002 ? 0.001 : vel * (0.28 + p.tone * 0.2), t);
  g.gain.linearRampToValueAtTime(vel * (0.28 + p.tone * 0.2), t + atk);
  g.gain.exponentialRampToValueAtTime(0.001, t + atk + dec);
  const buf = AC.createBuffer(1, Math.ceil(AC.sampleRate * Math.max(dec + atk + 0.05, 0.3)), AC.sampleRate);
  const dd = buf.getChannelData(0);
  for (let i = 0; i < dd.length; i++) dd[i] = Math.random() * 2 - 1;
  const ns = AC.createBufferSource(); ns.buffer = buf;
  const hpf = AC.createBiquadFilter(); hpf.type = 'highpass'; hpf.frequency.value = p.pitch * (0.3 + (p.hpf || 0.65) * 0.7);
  const bpf = AC.createBiquadFilter(); bpf.type = 'bandpass'; bpf.frequency.value = p.pitch; bpf.Q.value = 0.5 + p.metal * 3;
  ns.connect(hpf); hpf.connect(bpf); bpf.connect(g); g.connect(masterGain); ns.start(t);
  if (p.metal > 0.1) {
    const mg = AC.createGain();
    mg.gain.setValueAtTime(0.001, t);
    mg.gain.linearRampToValueAtTime(vel * p.metal * 0.12, t + atk);
    mg.gain.exponentialRampToValueAtTime(0.001, t + atk + dec * 0.6);
    const osc1 = AC.createOscillator(); osc1.type = 'square'; osc1.frequency.value = p.pitch * 1.414;
    const osc2 = AC.createOscillator(); osc2.type = 'square'; osc2.frequency.value = p.pitch * 1.732;
    osc1.connect(mg); osc2.connect(mg); mg.connect(masterGain);
    osc1.start(t); osc1.stop(t + atk + dec + 0.02);
    osc2.start(t); osc2.stop(t + atk + dec + 0.02);
  }
}

function playTom(t, vel = 1, overrides = {}) {
  const p = { ...SP.tom, ...overrides };
  const atk = p.attack || 0;
  const g = AC.createGain();
  g.gain.setValueAtTime(atk > 0.001 ? 0.001 : vel * (0.45 + p.body * 0.55), t);
  g.gain.linearRampToValueAtTime(vel * (0.45 + p.body * 0.55), t + atk);
  g.gain.exponentialRampToValueAtTime(0.001, t + atk + p.decay);
  const osc = AC.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(p.pitch + p.sweep * 16, t);
  osc.frequency.exponentialRampToValueAtTime(p.pitch, t + 0.06);
  if ((p.drive || 0) > 0.01) {
    const dist = mkDist(p.drive);
    osc.connect(dist); dist.connect(g);
  } else {
    osc.connect(g);
  }
  g.connect(masterGain);
  osc.start(t); osc.stop(t + atk + p.decay + 0.1);
}

function velCurve(v) { return Math.pow(v, 2.2); }

// ── Sample engine ──────────────────────────────────────────────────
// instSamples: decoded AudioBuffers recorded by the user (null = use synth)
const instSamples     = { kick:null, snare:null, hihat:null, tom:null };
const instSampleBeats = { kick:2, snare:2, hihat:2, tom:2 };

// ── Per-instrument FX chains ───────────────────────────────────────
// instFX[id] = { drive(WaveShaper), low(Biquad), mid(Biquad), high(Biquad),
//                dryGain, wetGain, convolver, input(Gain) }
// The chain: input → drive → low → mid → high → dryGain → masterGain
//                                              → wetGain → convolver → masterGain
const instFX = {};

// Default FX params per instrument
const instFXP = {
  kick:  { drive:0, bass:0, low:0, mid:0, high:0, wet:0, reverb:'room', comp:'none' },
  snare: { drive:0, bass:0, low:0, mid:0, high:0, wet:0, reverb:'room', comp:'none' },
  hihat: { drive:0, bass:0, low:0, mid:0, high:0, wet:0, reverb:'room', comp:'none' },
  tom:   { drive:0, bass:0, low:0, mid:0, high:0, wet:0, reverb:'room', comp:'none' },
};

// Compression presets — threshold / ratio / knee / attack / release
const COMP_PRESETS = {
  none:   { threshold:  0,  ratio: 1,   knee: 0,  attack: 0.003, release: 0.15 },
  normal: { threshold:-18,  ratio: 4,   knee: 6,  attack: 0.005, release: 0.12 },
  heavy:  { threshold:-30,  ratio: 12,  knee: 3,  attack: 0.001, release: 0.08 },
};

// ── Impulse response generator ─────────────────────────────────────
// Builds an algorithmic IR from decaying noise — no external files needed.
// type: 'room' (~0.8s, early reflections) | 'hall' (~2.5s, lush tail)
function makeImpulse(type, decayOverride) {
  const roomDur = 0.8, hallDur = 2.5;
  const dur     = type === 'hall' ? hallDur : roomDur;
  const decay   = decayOverride !== undefined ? decayOverride
                  : (type === 'hall' ? 2.8 : 1.8);
  const sr      = AC.sampleRate;
  const len     = Math.ceil(sr * dur);
  const buf     = AC.createBuffer(2, len, sr);

  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      // White noise shaped by exponential decay envelope
      const env = Math.pow(1 - i / len, decay);
      d[i] = (Math.random() * 2 - 1) * env;
      // For hall: add a small pre-delay gap (~20ms) and early reflection bump
      if (type === 'hall' && i < sr * 0.02) d[i] *= (i / (sr * 0.02));
    }
  }
  return buf;
}

let irRoom = null;
let irHall = null;

function getIR(type) { return type === 'hall' ? irHall : irRoom; }

// Build the FX chain for an instrument (called when a sample is loaded)
function buildFXChain(id) {
  teardownFXChain(id); // clear any existing chain

  const p = instFXP[id];

  // Input gain node — everything routes through here
  const input = AC.createGain();
  input.gain.value = 1;

  // Drive (waveshaper) — bypassed when drive=0
  const driveNode = AC.createWaveShaper();
  driveNode.curve = p.drive > 0.01 ? mkDist(p.drive).curve : null;
  driveNode.oversample = '2x';

  // 4-band EQ: bass shelf (80Hz) + low shelf (200Hz) + mid peak + high shelf
  const bass = AC.createBiquadFilter();
  bass.type = 'lowshelf'; bass.frequency.value = 80;
  bass.gain.value = p.bass;

  const low = AC.createBiquadFilter();
  low.type = 'lowshelf'; low.frequency.value = 200;
  low.gain.value = p.low;

  const mid = AC.createBiquadFilter();
  mid.type = 'peaking'; mid.frequency.value = 1000; mid.Q.value = 1;
  mid.gain.value = p.mid;

  const high = AC.createBiquadFilter();
  high.type = 'highshelf'; high.frequency.value = 6000;
  high.gain.value = p.high;

  // Compressor — placed after EQ, before dry/wet split
  const comp = AC.createDynamicsCompressor();
  const cp = COMP_PRESETS[p.comp] || COMP_PRESETS.none;
  comp.threshold.value = cp.threshold;
  comp.ratio.value     = cp.ratio;
  comp.knee.value      = cp.knee;
  comp.attack.value    = cp.attack;
  comp.release.value   = cp.release;

  // Dry / wet routing
  const dryGain = AC.createGain();
  dryGain.gain.value = 1 - p.wet;

  const wetGain = AC.createGain();
  wetGain.gain.value = p.wet;

  const convolver = AC.createConvolver();
  convolver.buffer = getIR(p.reverb) || irRoom;

  // Wire it up: input → bass → low → mid → high → drive → comp → dry/wet split → reverb
  input.connect(bass);
  bass.connect(low);
  low.connect(mid);
  mid.connect(high);
  high.connect(driveNode);
  driveNode.connect(comp);
  comp.connect(dryGain);
  comp.connect(wetGain);
  dryGain.connect(masterGain);
  wetGain.connect(convolver);
  convolver.connect(masterGain);

  instFX[id] = { input, driveNode, bass, low, mid, high, comp, dryGain, wetGain, convolver };
}

function teardownFXChain(id) {
  const fx = instFX[id];
  if (!fx) return;
  try {
    fx.input.disconnect(); fx.driveNode.disconnect();
    fx.bass.disconnect(); fx.low.disconnect(); fx.mid.disconnect(); fx.high.disconnect();
    fx.comp.disconnect();
    fx.dryGain.disconnect(); fx.wetGain.disconnect(); fx.convolver.disconnect();
  } catch(e) {}
  delete instFX[id];
}

// Apply current instFXP values to a live FX chain
function applyFX(id) {
  const fx = instFX[id];
  if (!fx) return;
  const p = instFXP[id];
  fx.driveNode.curve       = p.drive > 0.01 ? mkDist(p.drive).curve : null;
  fx.bass.gain.value       = p.bass;
  fx.low.gain.value        = p.low;
  fx.mid.gain.value        = p.mid;
  fx.high.gain.value       = p.high;
  const cp = COMP_PRESETS[p.comp] || COMP_PRESETS.none;
  fx.comp.threshold.value  = cp.threshold;
  fx.comp.ratio.value      = cp.ratio;
  fx.comp.knee.value       = cp.knee;
  fx.comp.attack.value     = cp.attack;
  fx.comp.release.value    = cp.release;
  fx.dryGain.gain.value    = 1 - p.wet;
  fx.wetGain.gain.value    = p.wet;
  fx.convolver.buffer      = getIR(p.reverb) || irRoom;
}

function playSample(id, t, vel, dur, overrides = {}) {
  const buf = instSamples[id];
  if (!buf) return;
  const v = velCurve(vel) * (instVol[id] ?? 1);
  const noteSecs = dur * stepDur();
  const src = AC.createBufferSource();
  src.buffer = buf;

  if (noteSecs >= buf.duration) {
    src.playbackRate.value = buf.duration / noteSecs;
  } else {
    src.playbackRate.value = 1;
  }

  const playDur = Math.min(noteSecs, buf.duration / src.playbackRate.value);
  const g = AC.createGain();
  g.gain.setValueAtTime(v, t);
  if (noteSecs < buf.duration) {
    g.gain.setValueAtTime(v, t + playDur - 0.01);
    g.gain.linearRampToValueAtTime(0, t + playDur);
  }

  // Route through FX chain if one exists, otherwise straight to master
  const dest = instFX[id] ? instFX[id].input : masterGain;
  src.connect(g); g.connect(dest);

  // Per-note delay send — only if note is armed with delay (delaySend > 0)
  if (overrides.delaySend > 0 && masterDelayNode) {
    const send = makeDelaySend(overrides.delaySend, t, playDur);
    g.connect(send);
  }

  src.start(t); src.stop(t + playDur + 0.01);
}

// ── Trigger dispatcher ─────────────────────────────────────────────
// Single entry point: routes to sample or synth voice, applies mute + vol.
function triggerInst(id, t, vel, dur, overrides = {}) {
  if (muted[id]) return;
  if (instSamples[id]) { playSample(id, t, vel, dur, overrides); return; }
  const v = velCurve(vel) * (instVol[id] ?? 1);
  if (id === 'kick')  playKick(t, v, overrides);
  else if (id === 'snare') playSnare(t, v, overrides);
  else if (id === 'hihat') playHihat(t, v, dur > 1, overrides);
  else if (id === 'tom')   playTom(t, v, overrides);

  // Delay send for synth voices — re-trigger the same voice into the delay bus
  if (overrides.delaySend > 0 && masterDelayNode) {
    const sendVol = overrides.delaySend * v;
    const playDur = dur * stepDur();
    const send = AC.createGain();
    send.gain.value = sendVol;
    send.connect(masterDelayNode);
    // Play the same voice into the send gain (without recursing into delay)
    const dryOverrides = { ...overrides, delaySend: 0 };
    // Temporarily reroute: we need the voice's output to also hit send.
    // Simplest: just connect masterGain → send for a very short window.
    // Use a timed gain that opens on the beat and closes quickly.
    const tap = AC.createGain();
    tap.gain.setValueAtTime(sendVol, t);
    tap.gain.setValueAtTime(0, t + Math.min(playDur, 0.3));
    masterGain.connect(tap);
    tap.connect(masterDelayNode);
    setTimeout(() => { try { masterGain.disconnect(tap); tap.disconnect(); send.disconnect(); } catch(e) {} },
      (t - AC.currentTime + playDur + 0.5) * 1000);
  }
}

// ═══════════════════════════════════════════════════════════════════
// MODULE: SEQUENCER
// Owns: step scheduling (scheduler, scheduleStep), transport control
//       (startSeq, stopSeq), and the visual sync tick (visualTick).
// Reads: notes, steps, bpm, swing, instYParam/Range from shared state.
// Writes: currentPos, nextStepTime, timerID, visualRaf.
// Future split: sequencer.js
// ═══════════════════════════════════════════════════════════════════

// ── Step duration helper ───────────────────────────────────────────
function stepDur() { return 60 / bpm / 4; }

function scheduleStep(step, t) {
  for (const inst of INSTRUMENTS) {
    const ns = notes[inst.id];
    if (!ns) continue;
    for (const n of ns) {
      if (n.step === step) {
        const swingOff = (step % 2 === 1) ? swing * stepDur() : 0;
        const override = {};
        const yp = instYParam[inst.id];
        if (n.entangled && yp && yp !== 'none' && yp !== null) {
          if (yp === 'delaySend') {
            // Route into shared delay at Y-value amount — unarmed notes get 0 (bypass)
            override.delaySend = n.yVal ?? n.vel;
          } else {
            const range = instYParamRange[inst.id] || { min:0, max:1 };
            override[yp] = range.min + (n.yVal ?? n.vel) * (range.max - range.min);
          }
        }
        triggerInst(inst.id, t + swingOff, n.vel, n.dur, override);
      }
    }
  }
}

function scheduler() {
  while (nextStepTime < AC.currentTime + LOOKAHEAD) {
    scheduleStep(currentPos, nextStepTime);
    // Resync seqStartTime every time we wrap to step 0 to prevent drift
    if (currentPos === 0) {
      seqStartTime = nextStepTime;
    }
    currentPos = (currentPos + 1) % steps;
    nextStepTime += stepDur();
  }
  timerID = setTimeout(scheduler, SCHED_INTERVAL);
}

function startSeq() {
  resumeAC();
  currentPos = 0;
  seqStartTime = AC.currentTime + 0.05;
  nextStepTime = seqStartTime;
  scheduler();
  visualRaf = requestAnimationFrame(visualTick);
}

function stopSeq() {
  clearTimeout(timerID);
  timerID = null;
  cancelAnimationFrame(visualRaf);
  visualRaf = null;
  lastRenderedStep = -1;
  renderAll();
}

// ── Visual sync ────────────────────────────────────────────────────
// Runs on rAF to keep the playhead and band renders in sync with audio time.
let seqStartTime    = 0;
let visualRaf       = null;
let lastRenderedStep = -1;

function visualTick() {
  if (!isPlaying) return;
  const elapsed = AC.currentTime - seqStartTime;
  const step = Math.floor(elapsed / stepDur()) % steps;
  if (step !== lastRenderedStep) {
    lastRenderedStep = step;
    renderAll();
    const sc = document.getElementById('step-cursor');
    sc.style.left = (step / steps * 100) + '%';
    sc.style.width = (1 / steps * 100) + '%';
  }
  visualRaf = requestAnimationFrame(visualTick);
}

// ═══════════════════════════════════════════════════════════════════
// MODULE: CANVAS RENDERER
// Owns: DPR-aware canvas setup, per-band drawing (notes, grid,
//       playhead, mute overlay), and the renderAll() broadcast.
// Reads: notes, steps, muted, isPlaying, glowOn, instYParam, drawSt.
// Future split: renderer.js
// ═══════════════════════════════════════════════════════════════════

// cvs: instId → <canvas> element  |  ctxs: instId → 2D context (scaled for DPR)
const cvs  = {};
const ctxs = {};

function ensureCanvas(id) {
  const c = cvs[id];
  if (!c) return null;
  const dpr = window.devicePixelRatio || 1;
  const w = c.offsetWidth, h = c.offsetHeight;
  if (w === 0 || h === 0) return null;
  if (c.width !== Math.round(w * dpr) || c.height !== Math.round(h * dpr)) {
    c.width = Math.round(w * dpr);
    c.height = Math.round(h * dpr);
    const cx = c.getContext('2d');
    cx.scale(dpr, dpr);
    ctxs[id] = cx;
  }
  return ctxs[id];
}

function renderBand(instId) {
  const cx = ensureCanvas(instId);
  if (!cx) return;
  const c = cvs[instId];
  const w = c.offsetWidth, h = c.offsetHeight;
  const inst = INSTRUMENTS.find(i => i.id === instId);
  const stepW = w / steps;

  cx.clearRect(0, 0, w, h);

  // BG
  cx.fillStyle = '#10101a';
  cx.fillRect(0, 0, w, h);

  // Grid verticals — whole steps
  for (let s = 0; s <= steps; s++) {
    const x = s * stepW;
    cx.beginPath();
    cx.moveTo(x, 0); cx.lineTo(x, h);
    if (s % 4 === 0) { cx.strokeStyle = '#28283e'; cx.lineWidth = 1; }
    else              { cx.strokeStyle = '#1a1a28'; cx.lineWidth = 0.5; }
    cx.stroke();
  }

  // Mid guide
  cx.strokeStyle = '#1e1e30';
  cx.lineWidth = 1;
  cx.setLineDash([3, 5]);
  cx.beginPath(); cx.moveTo(0, h * 0.5); cx.lineTo(w, h * 0.5); cx.stroke();
  cx.setLineDash([]);

  // Playhead — drawn later, on top of everything

  // Notes — merge actual notes with any active resize preview
  const ds = drawSt[instId];
  const preview = ds && ds.preview;
  const ns = (notes[instId] || []).map(n => {
    if (preview) {
      if (n === ds.hitNote) return { ...n, step: preview.step, dur: preview.dur };
      const aff = preview.affected.find(a => a.note === n);
      if (aff) return { ...n, step: aff.step, dur: aff.dur };
    }
    return n;
  });
  for (const n of ns) {
    const isPreviewNote = preview && (n === ds.hitNote || preview.affected.find(a => a.note === n));
    const x = n.step * stepW;
    const durW = Math.max(stepW * 0.3, n.dur * stepW - 2);
    const nh = Math.max(8, n.vel * h * 0.78);
    const ny = h - nh - 3;
    const col = inst.color;
    const edgePx = Math.min(8, durW * 0.2);
    cx.globalAlpha = isPreviewNote ? 0.5 : 1;

    // Soft halo
    cx.fillStyle = col + '14';
    cx.fillRect(x, 0, durW + 2, h);

    // Body
    cx.globalAlpha = isPreviewNote ? 0.25 : (0.18 + n.vel * 0.82);
    cx.fillStyle = col;
    if (cx.roundRect) {
      cx.beginPath(); cx.roundRect(x + 1.5, ny, durW - 2, nh, 3); cx.fill();
    } else {
      cx.fillRect(x + 1.5, ny, durW - 2, nh);
    }
    cx.globalAlpha = 1;

    // Top stripe
    cx.fillStyle = col;
    cx.fillRect(x + 1.5, ny, durW - 2, 2.5);

    // Diagonal hatch for entangled notes
    if (n.entangled && instYParam[instId]) {
      cx.save();
      cx.beginPath();
      if (cx.roundRect) cx.roundRect(x + 1.5, ny, durW - 2, nh, 3);
      else cx.rect(x + 1.5, ny, durW - 2, nh);
      cx.clip();
      cx.strokeStyle = col;
      cx.globalAlpha = 0.35;
      cx.lineWidth = 1;
      const spacing = 5;
      const diagLen = durW + nh;
      for (let d = -diagLen; d < diagLen; d += spacing) {
        cx.beginPath();
        cx.moveTo(x + 1.5 + d, ny);
        cx.lineTo(x + 1.5 + d + nh, ny + nh);
        cx.stroke();
      }
      cx.globalAlpha = 1;
      cx.restore();
    }

    // Left edge handle
    cx.fillStyle = '#fff';
    cx.globalAlpha = 0.5;
    cx.fillRect(x + 1.5, ny + 4, 2.5, nh - 8);
    // Right edge handle
    cx.fillRect(x + durW - 4, ny + 4, 2.5, nh - 8);
    cx.globalAlpha = 1;

    // Velocity dot — show yVal position if entangled
    const dotY = n.entangled && instYParam[instId]
      ? ny + nh * (1 - (n.yVal ?? n.vel))
      : ny + 6;
    cx.globalAlpha = 0.85;
    cx.fillStyle = n.entangled && instYParam[instId] ? col : '#ffffff';
    cx.beginPath();
    cx.arc(x + durW * 0.5, dotY, n.entangled && instYParam[instId] ? 3 : 2, 0, Math.PI * 2);
    cx.fill();
    cx.globalAlpha = 1;

    // Step label — top right
    if (stepW > 16) {
      cx.fillStyle = col;
      cx.globalAlpha = 0.6;
      cx.font = `bold ${Math.min(9, stepW * 0.42)}px 'JetBrains Mono', monospace`;
      cx.textAlign = 'right';
      cx.textBaseline = 'top';
      cx.fillText(n.step + 1, x + durW - 2, 2);
      cx.globalAlpha = 1;
    }
    cx.globalAlpha = 1;
  }

  // Muted overlay
  if (muted[instId]) {
    cx.fillStyle = 'rgba(8,8,16,0.6)';
    cx.fillRect(0, 0, w, h);
    cx.fillStyle = '#55556a';
    cx.font = 'bold 10px JetBrains Mono';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillText('MUTED', w / 2, h / 2);
  }

  // Live-record start marker — shown while hold-to-record is active
  const lst = liveRecSt[instId];
  if (lst?.active) {
    const pulse = 0.55 + 0.45 * Math.sin(performance.now() / 200); // 0.1–1.0, ~3 Hz
    const mx = lst.startStep * stepW;
    // Full-height red tint over the start step
    cx.fillStyle = 'rgba(224,48,48,0.18)';
    cx.fillRect(mx, 0, stepW, h);
    // Pulsing red line on left edge
    cx.strokeStyle = '#e03030';
    cx.lineWidth = 2.5;
    cx.globalAlpha = pulse;
    cx.shadowColor = '#e03030';
    cx.shadowBlur = 8 * pulse;
    cx.beginPath(); cx.moveTo(mx + 1, 0); cx.lineTo(mx + 1, h); cx.stroke();
    cx.shadowBlur = 0;
    // Small "REC" label
    cx.fillStyle = '#e03030';
    cx.font = 'bold 8px JetBrains Mono, monospace';
    cx.textAlign = 'left';
    cx.textBaseline = 'top';
    cx.fillText('REC', mx + 4, 3);
    cx.globalAlpha = 1;
  }

  // Playhead — on top of everything
  if (isPlaying && lastRenderedStep >= 0) {
    const px = lastRenderedStep * stepW;
    cx.globalAlpha = 1;
    if (glowOn) {
      // Glow mode: tinted step fill + glowing line
      cx.fillStyle = 'rgba(0,229,200,0.12)';
      cx.fillRect(px, 0, stepW, h);
      cx.strokeStyle = '#00e5c8';
      cx.lineWidth = 2;
      cx.shadowColor = '#00e5c8';
      cx.shadowBlur = 8;
      cx.beginPath(); cx.moveTo(px + 1, 0); cx.lineTo(px + 1, h); cx.stroke();
      cx.shadowBlur = 0;
    } else {
      // Clean mode: just a crisp line
      cx.strokeStyle = '#00e5c8';
      cx.lineWidth = 1.5;
      cx.beginPath(); cx.moveTo(px + 1, 0); cx.lineTo(px + 1, h); cx.stroke();
    }
  }
}

function renderAll() {
  INSTRUMENTS.forEach(i => renderBand(i.id));
}

// ═══════════════════════════════════════════════════════════════════
// MODULE: BAND INTERACTIONS
// Owns: per-band pointer/touch event handling — draw, resize, move,
//       velocity drag, double-tap delete.
// Writes: notes[], drawSt[] (ephemeral drag state per instrument).
// Future split: band-interactions.js
// ═══════════════════════════════════════════════════════════════════

// drawSt[instId]: ephemeral drag state, reset on each pointerdown
const drawSt = {};

function setupBandEvents(instId, canvas) {
  drawSt[instId] = { active: false };

  function getXY(e) {
    const r = canvas.getBoundingClientRect();
    // changedTouches works on all touch event types incl. touchend; touches is empty on touchend
    const src = (e.changedTouches && e.changedTouches[0]) ||
                (e.touches && e.touches[0]) || e;
    return { x: src.clientX - r.left, y: src.clientY - r.top };
  }
  function xToStep(x) {
    return Math.max(0, Math.min(steps - 1, Math.floor((x / canvas.offsetWidth) * steps)));
  }
  function stepToX(s) {
    return (s / steps) * canvas.offsetWidth;
  }
  function yToVel(y) {
    const norm = y / canvas.offsetHeight;
    if (norm <= 0.1) return 1.0;
    return Math.max(0.05, Math.min(1.0, 1.0 - (norm - 0.1) / 0.9));
  }
  function noteHitTest(x) {
    // Generous edge zones — 25% of note width each side, min 18px
    for (const n of (notes[instId] || [])) {
      const nx = stepToX(n.step);
      const nw = stepToX(n.step + n.dur) - nx;
      if (x >= nx && x <= nx + nw) {
        const edgePx = Math.min(nw * 0.28, Math.max(18, (canvas.offsetWidth / steps) * 0.45));
        if (x <= nx + edgePx) return { note: n, zone: 'left-edge' };
        if (x >= nx + nw - edgePx) return { note: n, zone: 'right-edge' };
        return { note: n, zone: 'body' };
      }
    }
    return null;
  }

  // Compute preview for resize. Always returns a valid {step, dur, affected}.
  // Clamps at the point where a neighbour can't be squeezed below 1.
  function computePreview(ds, cursorStep) {
    const n = ds.hitNote;
    const others = (notes[instId] || []).filter(o => o !== n);

    if (ds.mode === 'resize-right') {
      // Find the hard limit: rightmost we can push without any neighbour going below dur=1
      const rightNeighbours = others
        .filter(o => o.step >= n.step)
        .sort((a, b) => a.step - b.step);
      let maxEnd = steps;
      let frontier = cursorStep;
      // Walk forward to check if all neighbours can fit
      let testFrontier = Math.max(n.step + 1, Math.min(steps, cursorStep));
      for (const o of rightNeighbours) {
        if (o.step < testFrontier) {
          const squeezed = (o.step + o.dur) - testFrontier;
          if (squeezed < 1) {
            // Clamp newEnd so this note stays at exactly dur=1
            testFrontier = o.step + o.dur - 1;
            break;
          }
          testFrontier = testFrontier + squeezed;
        } else break;
      }
      const newEnd = Math.max(n.step + 1, testFrontier);
      const affected = [];
      let af = newEnd;
      for (const o of rightNeighbours) {
        if (o.step < af) {
          const squeezedDur = Math.max(1, (o.step + o.dur) - af);
          affected.push({ note: o, step: af, dur: squeezedDur });
          af = af + squeezedDur;
        } else break;
      }
      return { step: n.step, dur: newEnd - n.step, affected };
    }

    if (ds.mode === 'resize-left') {
      const origEnd = ds.origStep + ds.origDur;
      const leftNeighbours = others
        .filter(o => o.step + o.dur <= ds.origStep + 0.01)
        .sort((a, b) => b.step - a.step);
      let testFrontier = Math.max(0, Math.min(origEnd - 1, cursorStep));
      for (const o of leftNeighbours) {
        const oEnd = o.step + o.dur;
        if (oEnd > testFrontier) {
          const squeezed = testFrontier - o.step;
          if (squeezed < 1) {
            testFrontier = o.step + 1;
            break;
          }
          testFrontier = o.step;
        } else break;
      }
      const newStart = Math.max(0, testFrontier);
      const affected = [];
      let af = newStart;
      for (const o of leftNeighbours) {
        const oEnd = o.step + o.dur;
        if (oEnd > af) {
          const squeezedDur = Math.max(1, af - o.step);
          affected.push({ note: o, step: o.step, dur: squeezedDur });
          af = o.step;
        } else break;
      }
      return { step: newStart, dur: origEnd - newStart, affected };
    }
    return { step: n.step, dur: n.dur, affected: [] };
  }

  function onDown(e) {
    e.preventDefault();
    resumeAC();
    const { x, y } = getXY(e);
    const ds = drawSt[instId];
    ds.active = true;
    ds.startX = x; ds.startY = y;
    ds.t0 = Date.now();
    ds.mode = 'draw';
    ds.hitNote = null;
    ds.preview = null;
    ds.origStep = 0; ds.origDur = 0;
    ds.drawNote = null;

    const hit = noteHitTest(x);
    if (hit) {
      ds.hitNote = hit.note;
      if (hit.zone === 'right-edge') {
        ds.mode = 'resize-right';
        ds.origStep = hit.note.step;
        ds.origDur = hit.note.dur;
      } else if (hit.zone === 'left-edge') {
        ds.mode = 'resize-left';
        ds.origStep = hit.note.step;
        ds.origDur = hit.note.dur;
      } else {
        // Body — wait for axis to resolve: vertical=vel, horizontal=move
        ds.mode = 'pending-hit';
        ds.velDragStartY = y;
        ds.velDragStartVel = hit.note.vel;
        ds.moveStartX = x;
        ds.moveOrigStep = hit.note.step;
      }
    } else {
      ds.startStep = xToStep(x);
    }
    renderBand(instId);
  }

  function onMove(e) {
    e.preventDefault();
    const ds = drawSt[instId];
    if (!ds.active) return;
    const { x, y } = getXY(e);

    if (ds.mode === 'pending-hit') {
      const dx = Math.abs(x - ds.startX);
      const dy = Math.abs(y - ds.startY);
      if (dx < 4 && dy < 4) return; // not moved enough yet
      ds.mode = dx >= dy ? 'move' : 'vel';
    }

    if (ds.mode === 'vel') {
      // 1:1 with pointer: 120px of drag = full range (0→1)
      const PX_PER_UNIT = 120;
      const deltaVel = (ds.velDragStartY - y) / PX_PER_UNIT;
      const newVel = Math.max(0.05, Math.min(1.0, ds.velDragStartVel + deltaVel));
      ds.hitNote.vel = newVel;
      ds.hitNote.yVal = newVel; // keep yVal in sync with vel drag
      renderBand(instId); return;
    }

    if (ds.mode === 'move') {
      const n = ds.hitNote;
      const rawStep = ds.moveOrigStep + Math.round((x - ds.moveStartX) / (canvas.offsetWidth / steps));
      const clamped = Math.max(0, Math.min(steps - n.dur, rawStep));
      // Check collision with other notes
      const others = (notes[instId] || []).filter(o => o !== n);
      const blocked = others.some(o => !(o.step + o.dur <= clamped || o.step >= clamped + n.dur));
      if (!blocked) {
        n.step = clamped;
      }
      renderBand(instId); return;
    }

    if (ds.mode === 'resize-right' || ds.mode === 'resize-left') {
      const cursorStep = xToStep(x) + (ds.mode === 'resize-right' ? 1 : 0);
      ds.preview = computePreview(ds, cursorStep);
      renderBand(instId); return;
    }

    if (ds.mode === 'draw') {
      const curStep = xToStep(x);
      const sStep = ds.startStep;
      // Find first note strictly to the right of sStep (exclude the note being drawn)
      const blocker = (notes[instId] || [])
        .filter(n => n !== ds.drawNote && n.step >= sStep + 1)
        .sort((a, b) => a.step - b.step)[0];
      const maxEnd = blocker ? blocker.step : steps;
      const eStep = Math.min(maxEnd, Math.max(sStep + 1, curStep + 1));
      const dur = Math.round(eStep - sStep);
      const vel = yToVel(ds.startY);
      notes[instId] = [
        ...(notes[instId] || []).filter(n => n !== ds.drawNote),
        { step: sStep, vel, dur, yVal: vel }
      ];
      ds.drawNote = notes[instId][notes[instId].length - 1];
      renderBand(instId);
    }
  }

  function onUp(e) {
    const ds = drawSt[instId];
    if (!ds.active) return;
    const held = Date.now() - ds.t0;
    ds.active = false;

    if (ds.mode === 'vel' || ds.mode === 'move' || ds.mode === 'pending-hit') {
      if (ds.mode === 'pending-hit' && ds.hitNote) {
        // Single tap on note body — toggle entanglement if Y-param set
        if (instYParam[instId] !== null) {
          ds.hitNote.entangled = !ds.hitNote.entangled;
        }
        // No triggerInst here: avoids double-play on double-tap delete
      }
      // Velocity drag finished — play once at the new velocity so the user can hear it
      if (ds.mode === 'vel' && ds.hitNote && autoPlayOnPlace) {
        resumeAC();
        triggerInst(instId, AC.currentTime + 0.01, ds.hitNote.vel, ds.hitNote.dur);
      }
      renderBand(instId); return;
    }

    if (ds.mode === 'resize-right' || ds.mode === 'resize-left') {
      if (ds.preview) {
        ds.hitNote.step = Math.round(ds.preview.step);
        ds.hitNote.dur  = Math.round(ds.preview.dur);
        for (const a of ds.preview.affected) {
          a.note.step = Math.round(a.step);
          a.note.dur  = Math.round(a.dur);
        }
        notes[instId] = (notes[instId] || []).filter(n => n.dur >= 1);
      }
      ds.preview = null;
      renderBand(instId); return;
    }

    // Draw mode: tap = place whole note
    let endX = ds.startX;
    try { endX = getXY(e).x; } catch {}
    const isTap = Math.abs(endX - ds.startX) < 8 && held < 320;

    if (isTap) {
      const hit = noteHitTest(ds.startX);
      if (hit) {
        // Tapping an existing note — no sound (avoids double-play on double-tap delete)
      } else {
        const step = xToStep(ds.startX);
        const dur = instSamples[instId] ? instSampleBeats[instId] : 1;
        const vel = yToVel(ds.startY);
        const yVal = vel;
        const safe = Math.max(0, Math.min(steps - dur, step));
        notes[instId] = [...(notes[instId] || []).filter(n =>
          n.step + n.dur <= safe || n.step >= safe + dur
        ), { step: safe, vel, dur, yVal }];
        if (autoPlayOnPlace) triggerInst(instId, AC.currentTime + 0.01, vel, dur);
      }
    }
    renderBand(instId);
  }

  let lastTapTime = 0, lastTapX = 0;
  function handleDoubleTap(x) {
    const hit = noteHitTest(x);
    if (hit) {
      notes[instId] = (notes[instId] || []).filter(n => n !== hit.note);
      renderBand(instId); return true;
    }
    return false;
  }

  canvas.addEventListener('dblclick', (e) => { e.preventDefault(); handleDoubleTap(getXY(e).x); });
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('mouseleave', (e) => { if (drawSt[instId].active) onUp(e); canvas.style.cursor = 'crosshair'; });
  canvas.addEventListener('mousemove', (e) => {
    if (drawSt[instId].active) return;
    const { x } = getXY(e);
    const hit = noteHitTest(x);
    if (!hit) { canvas.style.cursor = 'crosshair'; return; }
    if (hit.zone === 'body') canvas.style.cursor = 'grab';
    else canvas.style.cursor = 'ew-resize';
  });
  canvas.addEventListener('touchstart', (e) => {
    const now = Date.now();
    const { x } = getXY(e);
    if (now - lastTapTime < 320 && Math.abs(x - lastTapX) < 20) {
      e.preventDefault(); drawSt[instId].active = false;
      handleDoubleTap(x); lastTapTime = 0; return;
    }
    lastTapTime = now; lastTapX = x;
    onDown(e);
  }, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);
}

// ═══════════════════════════════════════════════════════════════════
// MODULE: UI — INSTRUMENT PANELS
// Owns: band DOM construction (buildBands), instrument selection,
//       volume fill, Y-param picker, synth panel rendering.
// Future split: ui-bands.js + ui-synth-panel.js
// ═══════════════════════════════════════════════════════════════════

// ── Per-instrument UI state ────────────────────────────────────────
const instVol        = { kick:0.9, snare:0.9, hihat:0.9, tom:0.9 };
const instYParam     = { kick:null, snare:null, hihat:null, tom:null }; // null = vol drag
const instYParamRange = { kick:{min:0,max:1}, snare:{min:0,max:1}, hihat:{min:0,max:1}, tom:{min:0,max:1} };
// Saved per-note entanglement state for the 3-way cycle (off → all → saved → off)
const instEntangleSaved = { kick:null, snare:null, hihat:null, tom:null };

// ── Volume fill helper ─────────────────────────────────────────────
function updateVolFill(instId) {
  const fill = document.getElementById('volfill-' + instId);
  if (fill) fill.style.height = (instVol[instId] * 100) + '%';
}

function showYParamPicker(instId, anchorEl) {
  const picker = document.getElementById('yparam-picker');
  const defs = SYNTH_DEFS[instId] || [];
  const current = instYParam[instId];
  const inst = INSTRUMENTS.find(i => i.id === instId);

  picker.innerHTML = `<div class="yparam-label" style="color:${inst.color}">Y → ${inst.name}</div>` +
    `<div class="yparam-opt${current === 'none' ? ' active' : ''}" data-key="none">— None —</div>` +
    `<div class="yparam-opt${current === 'delaySend' ? ' active' : ''}" data-key="delaySend" data-min="0" data-max="1" style="color:#ffe040">⟳ Delay send</div>` +
    defs.map(d => `<div class="yparam-opt${current === d.k ? ' active' : ''}" data-key="${d.k}" data-min="${d.min}" data-max="${d.max}">${d.l}</div>`).join('');

  // Position: to the right of anchor, clamped to screen
  picker.classList.add('visible');
  const r = anchorEl.getBoundingClientRect();
  const pw = picker.offsetWidth || 120;
  const ph = picker.offsetHeight || 200;
  const vw = window.innerWidth, vh = window.innerHeight;
  let left = r.right + 6;
  let top = r.top - 10;
  if (left + pw > vw - 6) left = r.left - pw - 6; // flip to left if off-screen
  if (left < 6) left = 6;
  if (top + ph > vh - 6) top = vh - ph - 6;
  if (top < 6) top = 6;
  picker.style.left = left + 'px';
  picker.style.top = top + 'px';

  picker.querySelectorAll('.yparam-opt').forEach(opt => {
    opt.addEventListener('click', (e) => {
      e.stopPropagation();
      const k = opt.dataset.key;
      instYParam[instId] = k === 'none' ? 'none' : k;
      if (instYParam[instId] && instYParam[instId] !== 'none') {
        instYParamRange[instId] = { min: +opt.dataset.min, max: +opt.dataset.max };
      }
      picker.classList.remove('visible');
      updateMuteBtn(instId);
      renderBand(instId);
    });
  });
}

function updateMuteBtn(instId) {
  const yInd = document.getElementById('yparam-ind-' + instId);
  if (yInd) {
    const param = instYParam[instId];
    if (param && param !== 'none') {
      yInd.textContent = param.toUpperCase();
      yInd.style.display = 'block';
    } else {
      yInd.textContent = '';
      yInd.style.display = 'none';
    }
  }
}

// Close picker on outside tap
document.addEventListener('pointerdown', (e) => {
  const picker = document.getElementById('yparam-picker');
  if (!picker.contains(e.target)) picker.classList.remove('visible');
}, true);

// ── Band DOM builder ───────────────────────────────────────────────
function buildBands() {
  const container = document.getElementById('bands');
  container.innerHTML = '';
  INSTRUMENTS.forEach((inst) => {
    const row = document.createElement('div');
    row.className = 'band-row';

    const lbl = document.createElement('div');
    lbl.className = 'band-label' + (inst.id === selectedInst ? ' selected' : '');
    lbl.style.color = inst.color;
    lbl.innerHTML = `
      <div class="vol-fill" id="volfill-${inst.id}" style="background:${inst.color};height:${instVol[inst.id]*100}%"></div>
      <span class="inst-name">${inst.name}</span>
      <span class="inst-yparam" id="yparam-ind-${inst.id}" style="display:${instYParam[inst.id] && instYParam[inst.id]!=='none' ? 'block' : 'none'};color:${inst.color}">${instYParam[inst.id] && instYParam[inst.id]!=='none' ? instYParam[inst.id].toUpperCase() : ''}</span>
    `;

    // Standalone rec button column
    const recCol = document.createElement('div');
    recCol.className = 'band-rec-col';
    const recBtn = document.createElement('span');
    recBtn.className = 'inst-rec' + (instSamples[inst.id] ? ' sampled' : '');
    recBtn.id = 'rec-' + inst.id;
    recBtn.textContent = '⏺';
    recCol.appendChild(recBtn);
    recBtn.addEventListener('pointerdown', (e) => e.stopPropagation());
    recBtn.addEventListener('pointermove', (e) => e.stopPropagation());

    let recHoldTimer = null;
    let recLiveActive = false;

    recBtn.addEventListener('pointerdown', (e) => {
      e.stopPropagation();
      recBtn.setPointerCapture(e.pointerId);
      recLiveActive = false;
      recHoldTimer = setTimeout(() => {
        recHoldTimer = null;
        recLiveActive = true;
        startLiveRecord(inst.id, recBtn);
      }, 300);
    });

    recBtn.addEventListener('pointerup', (e) => {
      e.stopPropagation();
      if (recHoldTimer !== null) {
        // Short tap — open modal
        clearTimeout(recHoldTimer); recHoldTimer = null;
        openSampleModal(inst.id);
      } else if (recLiveActive) {
        // Was holding — stop live recording
        recLiveActive = false;
        stopLiveRecord(inst.id, recBtn);
      }
    });

    recBtn.addEventListener('pointercancel', (e) => {
      clearTimeout(recHoldTimer); recHoldTimer = null;
      if (recLiveActive) { recLiveActive = false; stopLiveRecord(inst.id, recBtn); }
    });

    // Volume drag + swipe-to-mute
    // Swipe down past threshold → mute (vol→0), swipe back up → restore
    let holdTimer = null;
    let pointerStartY = 0;
    let volStartVal = 0.9;
    let didHold = false;
    let isDragging = false;
    let isDown = false;       // true from pointerdown until pointerup/cancel
    let mutedBySwipe = false;
    let premuteVol = 0.9;

    lbl.addEventListener('pointerdown', (e) => {
      if (e.target === recBtn) return;
      pointerStartY = e.clientY;
      volStartVal = instVol[inst.id];
      didHold = false;
      isDragging = false;
      isDown = true;
      holdTimer = setTimeout(() => {
        didHold = true;
        holdTimer = null;
        showYParamPicker(inst.id, lbl);
      }, 400);
      lbl.setPointerCapture(e.pointerId);
    });

    let volDragLastTrigger = 0;

    lbl.addEventListener('pointermove', (e) => {
      if (e.target === recBtn || !isDown) return;
      const dy = e.clientY - pointerStartY;
      if (!isDragging && Math.abs(dy) > 6) {
        isDragging = true;
        clearTimeout(holdTimer); holdTimer = null;
      }
      if (isDragging) {
        // 1:1 with pointer: 150px of drag = full range (0→1)
        const PX_PER_UNIT = 150;
        const newVol = Math.max(0, Math.min(1, volStartVal - dy / PX_PER_UNIT));
        instVol[inst.id] = newVol;
        updateVolFill(inst.id);
        // Mute indicator: if dragged to 0, mark as muted
        muted[inst.id] = newVol === 0;
        lbl.classList.toggle('muted-swipe', muted[inst.id]);
      }
    });

    // Double-tap tracking for mute
    let lastLblTap = 0;

    lbl.addEventListener('pointerup', (e) => {
      if (e.target === recBtn) return;
      if (holdTimer !== null) {
        clearTimeout(holdTimer); holdTimer = null;
        if (!isDragging) {
          const now = Date.now();
          const isDoubleTap = (now - lastLblTap) < 320;
          lastLblTap = isDoubleTap ? 0 : now; // reset so triple-tap doesn't re-trigger

          if (isDoubleTap) {
            // Double tap — toggle mute
            if (muted[inst.id]) {
              muted[inst.id] = false;
              instVol[inst.id] = premuteVol || 0.9;
              lbl.classList.remove('muted-swipe');
              updateVolFill(inst.id);
            } else {
              premuteVol = instVol[inst.id];
              muted[inst.id] = true;
              instVol[inst.id] = 0;
              lbl.classList.add('muted-swipe');
              updateVolFill(inst.id);
            }
            renderBand(inst.id);
          } else {
            // Single tap — select instrument / cycle entanglement
            if (instYParam[inst.id] !== null) {
              const ns = notes[inst.id] || [];
              const allOn  = ns.length > 0 && ns.every(n => n.entangled);
              const allOff = ns.every(n => !n.entangled);
              const hasSaved = instEntangleSaved[inst.id] !== null;
              if (allOff) {
                instEntangleSaved[inst.id] = ns.map(n => n.entangled);
                ns.forEach(n => { n.entangled = true; });
              } else if (allOn && hasSaved) {
                const saved = instEntangleSaved[inst.id];
                ns.forEach((n, i) => { n.entangled = saved[i] ?? false; });
              } else {
                instEntangleSaved[inst.id] = ns.map(n => n.entangled);
                ns.forEach(n => { n.entangled = false; });
              }
              renderBand(inst.id);
            } else {
              selectInst(inst.id);
            }
          }
        }
      }
      const wasDragging = isDragging;
      isDragging = false;
      didHold = false;
      isDown = false;
    });

    lbl.addEventListener('pointercancel', () => {
      clearTimeout(holdTimer); holdTimer = null; didHold = false; isDragging = false; isDown = false;
    });

    const wrap = document.createElement('div');
    wrap.className = 'band-wrap';
    const canvas = document.createElement('canvas');
    canvas.className = 'band-cv';
    canvas.id = 'cv-' + inst.id;
    wrap.appendChild(canvas);
    row.appendChild(recCol);
    row.appendChild(lbl);
    row.appendChild(wrap);
    container.appendChild(row);
    cvs[inst.id] = canvas;
    setupBandEvents(inst.id, canvas);
  });
}

// ── Instrument selection ───────────────────────────────────────────
function selectInst(id) {
  selectedInst = id;
  document.querySelectorAll('.band-label').forEach((el, i) => {
    el.classList.toggle('selected', INSTRUMENTS[i].id === id);

  const inst = INSTRUMENTS.find(i => i.id === id);
  document.getElementById('stb-name').textContent = inst.name;
  document.getElementById('stb-name').style.color = inst.color;
  renderSynthPanel();
}

function applyPreset(instId, preset) {
  Object.assign(SP[instId], preset.p);
  renderSynthPanel();
  if (autoTest) {
    resumeAC();
    triggerInst(instId, AC.currentTime + 0.05, 0.82, 1);
  }
}

function renderSynthPanel() {

  const inst = INSTRUMENTS.find(i => i.id === selectedInst);

  // ── Context switch: FX rack when sample is loaded ─────────────

    renderFXPanel(inner, inst);
    return;
  }

  // ── Synth params (no sample loaded) ───────────────────────────
  const defs = SYNTH_DEFS[selectedInst] || [];
  const params = SP[selectedInst] || {};
  const presets = PRESETS[selectedInst] || [];

  inner.innerHTML = `
    <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:6px;">

      <div class="param" style="flex:0 0 auto;min-width:60px;">
        <div class="param-header"><label>Reverb type</label></div>
        <div style="display:flex;border:1px solid var(--border);border-radius:3px;overflow:hidden;margin-top:4px;">
          <button class="rec-mode-btn${p.reverb==='room'?' active':''}" data-irtype="room" style="flex:1;font-size:8px;">Room</button>
          <button class="rec-mode-btn${p.reverb==='hall'?' active':''}" data-irtype="hall" style="flex:1;font-size:8px;">Hall</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById('synth-close-btn').addEventListener('click', toggleSynthPanel);
  document.getElementById('fx-preview-btn').addEventListener('click', () => {
    resumeAC();
    triggerInst(id, AC.currentTime + 0.01, 0.82, 1);
  });

  // Sliders
  inner.querySelectorAll('input[data-fx]').forEach(inp => {
    inp.addEventListener('input', function () {
      const key = this.dataset.fx;
      const val = +this.value;
      instFXP[id][key] = val;
      applyFX(id);
      const lbl = document.getElementById('fxv-' + key);
      if (!lbl) return;
      if      (key === 'drive') lbl.textContent = val.toFixed(2);
      else if (key === 'wet')   lbl.textContent = fmtPct(val);
      else                      lbl.textContent = fmtDb(val);
    });
    inp.addEventListener('change', () => {
      if (autoTest) { resumeAC(); triggerInst(id, AC.currentTime + 0.01, 0.82, 1); }
    });
  });

  // Room / Hall toggle
  inner.querySelectorAll('[data-irtype]').forEach(btn => {
    btn.addEventListener('click', () => {
      instFXP[id].reverb = btn.dataset.irtype;
      applyFX(id);
      inner.querySelectorAll('[data-irtype]').forEach(b =>
        b.classList.toggle('active', b === btn));
    });
  });

  // Comp preset toggle
  inner.querySelectorAll('[data-comp]').forEach(btn => {
    btn.addEventListener('click', () => {
      instFXP[id].comp = btn.dataset.comp;
      applyFX(id);
      inner.querySelectorAll('[data-comp]').forEach(b =>
        b.classList.toggle('active', b === btn));
    });
  });
}

function fmtParam(min, max, val, fmt) {
  if (val === undefined || val === null) return '—';
  if (fmt === '1s') return (+val).toFixed(1) + 's';
  if (max <= 1) return (+val).toFixed(2);
  if (max > 1000) return Math.round(val) + 'hz';
  return Math.round(val);
}

// ── Scene loader ───────────────────────────────────────────────────
function loadScene(scene) {
  // Set global transport
  bpm = scene.bpm;
  document.getElementById('bpm-slider').value = bpm;
  document.getElementById('bpm-display').textContent = bpm;
  steps = scene.steps;
  document.querySelectorAll('.step-btn').forEach(b => b.classList.toggle('active', +b.dataset.steps === steps));
  swing = scene.swing;
  document.getElementById('swing-slider').value = swing;
  document.getElementById('swing-val').textContent = Math.round(swing / 0.15 * 100) + '%';
  // Load synth params
  Object.keys(scene.sp).forEach(id => Object.assign(SP[id], scene.sp[id]));
  // Load notes
  Object.keys(notes).forEach(k => notes[k] = (scene.notes[k] || []).map(n => ({...n})));
  // Re-render
  renderSynthPanel();
  renderAll();
  // Leave scene-select showing the loaded preset name (don't reset to '')
}
