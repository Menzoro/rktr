// MODULE: SAMPLE RECORDER
// Owns: hold-to-record (startLiveRecord/stopLiveRecord), the sample
//       modal tape recorder (startTape, startCropRecord, drawTapeLoop,
//       stopTape, drawBufferWaveform), and all MediaRecorder plumbing.
// Reads: bpm, steps, instSamples, instSampleBeats, notes (writes back).
// Future split: sample-recorder.js
// ═══════════════════════════════════════════════════════════════════

// ── Live hold-to-record state ──────────────────────────────────────
// liveRec[instId] = { active, mr, stream } | null
const liveRec = {};

async function startLiveRecord(instId, btn) {
  if (liveRec[instId]?.active) return;

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(e) {
    return;
  }

  // Snap to next step boundary when sequencer is running
  const delayMs  = isPlaying ? Math.max(0, (nextStepTime - AC.currentTime) * 1000) : 0;
  const startStep = isPlaying ? (currentPos % steps) : 0;

  // ── Visual: mark start position on the band ────────────────────
  liveRecSt[instId] = { active: true, startStep };

  // ── Audio: duck the backing beat ───────────────────────────────
  duckMaster();

  const chunks = [];
  const mr = new MediaRecorder(stream, (() => {
    const preferred = ['audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm','audio/ogg'];
    const mime = preferred.find(t => MediaRecorder.isTypeSupported(t)) || '';
    return mime ? { mimeType: mime } : {};
  })());
  mr.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
  mr.onstop = async () => {
    stream.getTracks().forEach(t => t.stop());
    btn.classList.remove('live-recording');

    // Clear visual marker and restore gain
    cancelAnimationFrame(liveRec[instId]?.pulseRaf);
    liveRecSt[instId] = { active: false, startStep: 0 };
    unduckMaster();
    renderBand(instId);

    try {
      const mimeType = mr.mimeType || '';
      const blob = new Blob(chunks, mimeType ? { type: mimeType } : {});
      const arrayBuf = await blob.arrayBuffer();
      const tryDecode = (ctx) => new Promise((res, rej) => ctx.decodeAudioData(arrayBuf.slice(0), res, rej));
      let decoded;
      try { decoded = await tryDecode(AC); }
      catch(e1) {
        const ac2 = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        decoded = await tryDecode(ac2);
        ac2.close();
      }
      const durSteps = Math.max(1, Math.round(decoded.duration / stepDur()));
      instSamples[instId] = decoded;
      instSampleBeats[instId] = durSteps;
      buildFXChain(instId);
      btn.classList.add('sampled');
      if (instId === selectedInst) renderSynthPanel();

      // Auto-place note at the step where recording started
      if (isPlaying || startStep > 0) {
        const ns = notes[instId] || [];
        notes[instId] = ns.filter(n => n.step !== startStep);
        notes[instId].push({ step: startStep, vel: 0.9, dur: durSteps });
        renderAll();
      }
    } catch(err) {
      console.error('Live rec decode failed', err);
    }
    liveRec[instId] = null;
  };

  liveRec[instId] = { active: true, mr, stream, pulseRaf: null };

  // Pulse the marker via rAF so it visually breathes while holding
  function pulseTick() {
    if (!liveRecSt[instId]?.active) return;
    renderBand(instId);
    liveRec[instId].pulseRaf = requestAnimationFrame(pulseTick);
  }
  liveRec[instId].pulseRaf = requestAnimationFrame(pulseTick);

  btn.classList.add('live-recording');

  setTimeout(() => {
    if (liveRec[instId]?.active) mr.start(50);
  }, delayMs);
}

function stopLiveRecord(instId, btn) {
  const state = liveRec[instId];
  if (!state?.active) return;
  state.active = false;
  cancelAnimationFrame(state.pulseRaf);
  if (state.mr.state !== 'inactive') state.mr.stop();
  // Note: liveRecSt cleared and unduck called inside mr.onstop
}

let sampleInstId  = null;
let sampleBeats   = 1;
let mediaStream   = null;
let mediaRecorder = null;
let recChunks     = [];
let pendingBuffer = null;
let analyserNode  = null;

// Tape animator state
let tapeActive      = false;
let tapeRecording   = false;
let tapeRAF         = null;
let tapeSamples     = [];
let tapePos         = 0;
let tapeCanvasW     = 300;
let tapeCanvasH     = 110;
let tapeSecs        = 0;
let tapeRecSecs     = 0;
let tapePrerollFrac = 0.5;
let tapeStartTime   = 0;
let tapeRecStartTime = 0;

function getTapeCanvas() {
  const cv = document.getElementById('sample-canvas');
  const wrap = cv.parentElement;
  const w = wrap.offsetWidth || 300;
  const h = 110;
  if (cv.width !== w || cv.height !== h) { cv.width = w; cv.height = h; }
  tapeCanvasW = cv.width;
  tapeCanvasH = cv.height;
  return cv;
}

function openSampleModal(instId) {
  resumeAC();
  sampleInstId = instId;
  pendingBuffer = null;
  recChunks = [];
  const inst = INSTRUMENTS.find(i => i.id === instId);
  document.getElementById('sm-title').textContent = `Sample — ${inst.name}`;
  document.getElementById('sm-title').style.color = inst.color;
  const btn = document.getElementById('sample-rec-btn');
  btn.textContent = '⏺ Start';
  btn.className = '';
  btn.disabled = false;
  document.getElementById('sample-timer').textContent = '';
  document.getElementById('sample-timer').style.color = 'var(--muted)';
  document.getElementById('sm-confirm').disabled = true;
  document.getElementById('sm-play').disabled = true;
  // Reset mode to tape
  recMode = 'tape';
  cropOffsetSec = 0;
  cropBeats = 1;
  document.querySelectorAll('.rec-mode-btn').forEach(b => b.classList.toggle('active', b.dataset.recmode === 'tape'));
  document.getElementById('sm-tape-lengths').style.display = '';
  document.getElementById('sm-crop-lengths').style.display = 'none';
  document.getElementById('sm-crop-region').style.display = 'none';
  document.querySelectorAll('[data-cropbeats]').forEach(b => b.classList.toggle('active', +b.dataset.cropbeats === 1));
  document.querySelectorAll('.sm-len').forEach(b => b.classList.toggle('active', +b.dataset.beats === sampleBeats));
  document.getElementById('sample-modal').classList.add('visible');
  setTimeout(() => {
    drawTapePreview();
  }, 40);
}

function closeSampleModal() {
  stopTape();
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  document.getElementById('sample-modal').classList.remove('visible');
  sampleInstId = null;
}

function updatePlayhead(xPx, midX) {
  const ph = document.getElementById('sm-playhead');
  const w = tapeCanvasW || 300;
  const mid = midX !== undefined ? midX : w * tapePrerollFrac;
  ph.style.left = Math.min(xPx, w - 2) + 'px';
  const inRec = xPx >= mid;
  ph.classList.toggle('in-rec', inRec);
}

async function startTape() {
  const btn = document.getElementById('sample-rec-btn');
  btn.disabled = true;
  btn.textContent = 'opening mic…';

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '⏺ Start';
    alert('Microphone access denied.');
    return;
  }
  mediaStream = stream;

  // Set up analyser for live waveform
  const srcNode = AC.createMediaStreamSource(mediaStream);
  analyserNode = AC.createAnalyser();
  analyserNode.fftSize = 256;
  srcNode.connect(analyserNode);

  // Tape config: pre-roll always 2 quarter-note beats, rec = selected length in 16th steps
  const stepSec = 60 / bpm / 4;
  const prerollSecs = 2 * (60 / bpm);
  tapeRecSecs = sampleBeats * stepSec;
  tapeSecs = prerollSecs + tapeRecSecs;

  const cv = getTapeCanvas();
  const prerollFrac = prerollSecs / tapeSecs;
  const midX = Math.round(cv.width * prerollFrac);
  tapeSamples = new Float32Array(cv.width).fill(0);
  tapePos = 0;
  tapeActive = true;
  tapeRecording = false;
  tapeStartTime = performance.now();
  tapePrerollFrac = prerollFrac;

  // Set overlays precisely from actual canvas width
  document.getElementById('sm-center-line').style.left = midX + 'px';
  document.getElementById('sm-rec-tint').style.left = midX + 'px';
  document.getElementById('sm-rec-tint').style.width = (cv.width - midX) + 'px';
  document.getElementById('sm-rec-tint').style.opacity = '';  // restore visibility
  document.getElementById('sm-playhead').style.display = '';

  btn.textContent = '● Pre-roll…';
  btn.className = 'preroll';
  btn.disabled = false;
  document.getElementById('sample-timer').textContent = 'get ready…';
  document.getElementById('sample-timer').style.color = 'var(--muted)';

  // MediaRecorder — ready but not started yet
  recChunks = [];
  mediaRecorder = new MediaRecorder(mediaStream, (() => {
    const preferred = ['audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm','audio/ogg'];
    const mime = preferred.find(t => MediaRecorder.isTypeSupported(t)) || '';
    return mime ? { mimeType: mime } : {};
  })());
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    const timerEl = document.getElementById('sample-timer');
    timerEl.textContent = 'decoding…';
    timerEl.style.color = 'var(--muted)';
    try {
      const mimeType = mediaRecorder.mimeType || '';
      const blob = new Blob(recChunks, mimeType ? { type: mimeType } : {});
      const arrayBuf = await blob.arrayBuffer();
      let decoded = null;
      const tryDecode = (ctx) => new Promise((res, rej) => ctx.decodeAudioData(arrayBuf.slice(0), res, rej));
      try { decoded = await tryDecode(AC); }
      catch(e1) {
        try {
          const ac2 = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
          decoded = await tryDecode(ac2);
          ac2.close();
        } catch(e2) { throw e2; }
      }
      pendingBuffer = decoded;
      drawBufferWaveform(pendingBuffer);
      document.getElementById('sm-confirm').disabled = false;
      document.getElementById('sm-play').disabled = false;
      document.getElementById('sm-rec-tint').style.opacity = '0'; // hide tint after recording
      timerEl.textContent = pendingBuffer.duration.toFixed(2) + 's recorded';
      timerEl.style.color = 'var(--accent)';
      const btn2 = document.getElementById('sample-rec-btn');
      btn2.textContent = '⏺ Re-record';
      btn2.className = '';
      btn2.disabled = false;
      // Show crop region if in crop mode
      if (recMode === 'crop') { cropOffsetSec = 0; updateCropRegion(); }
    } catch(err) {
      document.getElementById('sample-timer').textContent = 'decode error :(';
      console.error('decode failed', err);
      const btn2 = document.getElementById('sample-rec-btn');
      btn2.textContent = '⏺ Retry';
      btn2.className = '';
      btn2.disabled = false;
    }
  };

  drawTapeLoop();
}

// ── Crop mode: record immediately, no pre-roll ────────────────────
async function startCropRecord() {
  const btn = document.getElementById('sample-rec-btn');
  const timerEl = document.getElementById('sample-timer');
  btn.disabled = true;
  btn.textContent = 'opening mic…';

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch(err) {
    btn.disabled = false;
    btn.textContent = '⏺ Start';
    alert('Microphone access denied.');
    return;
  }
  mediaStream = stream;

  // Hide tape overlays — not needed in crop mode
  document.getElementById('sm-center-line').style.display = 'none';
  document.getElementById('sm-rec-tint').style.display = 'none';
  document.getElementById('sm-label-pre').style.display = 'none';
  document.getElementById('sm-label-rec').style.display = 'none';
  document.getElementById('sm-playhead').style.display = 'none';

  // Set up live waveform analyser
  const srcNode = AC.createMediaStreamSource(mediaStream);
  analyserNode = AC.createAnalyser();
  analyserNode.fftSize = 256;
  srcNode.connect(analyserNode);

  const recSecs = sampleBeats * (60 / bpm / 4); // sampleBeats=8 = 2 beats
  tapeActive = true;
  tapeRecording = true;
  tapeStartTime = performance.now();
  tapeSamples = new Float32Array((getTapeCanvas().width)).fill(0);
  tapePrerollFrac = 0; // whole canvas = rec

  recChunks = [];
  mediaRecorder = new MediaRecorder(mediaStream, (() => {
    const preferred = ['audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm','audio/ogg'];
    const mime = preferred.find(t => MediaRecorder.isTypeSupported(t)) || '';
    return mime ? { mimeType: mime } : {};
  })());
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRecorder.onstop = async () => {
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    timerEl.textContent = 'decoding…';
    timerEl.style.color = 'var(--muted)';
    try {
      const mimeType = mediaRecorder.mimeType || '';
      const blob = new Blob(recChunks, mimeType ? { type: mimeType } : {});
      const arrayBuf = await blob.arrayBuffer();
      const tryDecode = (ctx) => new Promise((res, rej) => ctx.decodeAudioData(arrayBuf.slice(0), res, rej));
      let decoded;
      try { decoded = await tryDecode(AC); }
      catch(e1) {
        const ac2 = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
        decoded = await tryDecode(ac2);
        ac2.close();
      }
      pendingBuffer = decoded;
      drawBufferWaveform(pendingBuffer);
      document.getElementById('sm-confirm').disabled = false;
      document.getElementById('sm-play').disabled = false;
      timerEl.textContent = pendingBuffer.duration.toFixed(2) + 's — drag to select';
      timerEl.style.color = 'var(--accent)';
      btn.textContent = '⏺ Re-record';
      btn.className = '';
      btn.disabled = false;
      cropOffsetSec = 0;
      updateCropRegion();
    } catch(err) {
      timerEl.textContent = 'decode error :(';
      btn.textContent = '⏺ Retry';
      btn.className = '';
      btn.disabled = false;
    }
    tapeActive = false;
  };

  mediaRecorder.start(100);
  btn.textContent = '⏹ Stop';
  btn.className = 'recording';
  btn.disabled = false;
  timerEl.style.color = '#e03030';

  // Drive live waveform and timer using the existing tape draw loop
  tapeRecSecs = recSecs;
  tapeSecs = recSecs;
  drawTapeLoop();
}

function drawTapeLoop() {
  if (!tapeActive) return;
  const cv = getTapeCanvas();
  const cx = cv.getContext('2d');
  const w = cv.width, h = cv.height;
  const midX = Math.round(w * tapePrerollFrac);
  const elapsed = (performance.now() - tapeStartTime) / 1000;
  const progress = Math.min(elapsed / tapeSecs, 1.0);
  const xPx = progress * w;

  // Sample current amplitude
  const freqBuf = new Uint8Array(analyserNode.frequencyBinCount);
  analyserNode.getByteTimeDomainData(freqBuf);
  let peak = 0;
  for (let i = 0; i < freqBuf.length; i++) {
    const v = Math.abs(freqBuf[i] / 128 - 1);
    if (v > peak) peak = v;
  }
  tapeSamples[Math.floor(xPx)] = peak;

  // Start MediaRecorder exactly when playhead crosses the preroll boundary
  if (!tapeRecording && xPx >= midX) {
    tapeRecording = true;
    tapeRecStartTime = performance.now();
    mediaRecorder.start(100);
    const btn = document.getElementById('sample-rec-btn');
    btn.textContent = '⏹ Stop';
    btn.className = 'recording';
    document.getElementById('sample-timer').style.color = '#e03030';
  }

  // Update timer display
  const timerEl = document.getElementById('sample-timer');
  if (tapeRecording) {
    const recElapsed = (performance.now() - tapeRecStartTime) / 1000;
    const remaining = Math.max(0, tapeRecSecs - recElapsed);
    timerEl.textContent = remaining.toFixed(1) + 's';
    timerEl.style.color = remaining < 1 ? '#ff6060' : '#e03030';
  }

  // Draw canvas
  cx.fillStyle = '#18182a';
  cx.fillRect(0, 0, w, h);

  // Draw waveform columns
  for (let i = 0; i < Math.floor(xPx); i++) {
    const amp = tapeSamples[i] || 0;
    const barH = Math.max(2, amp * (h - 8));
    const inRec = recMode === 'crop' || i >= midX;
    cx.fillStyle = inRec ? 'rgba(0,229,200,0.75)' : 'rgba(100,100,140,0.5)';
    cx.fillRect(i, (h - barH) / 2, 1, barH);
  }

  // Fade undrawn future zone
  cx.fillStyle = 'rgba(24,24,42,0.55)';
  cx.fillRect(Math.floor(xPx), 0, w - Math.floor(xPx), h);

  updatePlayhead(xPx, midX);

  if (progress >= 1.0) {
    stopTape();
    return;
  }

  tapeRAF = requestAnimationFrame(drawTapeLoop);
}

function stopTape() {
  tapeActive = false;
  cancelAnimationFrame(tapeRAF);
  analyserNode = null;
  if (tapeRecording) {
    tapeRecording = false;
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
  } else {
    // Stopped before rec started — clean up
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    const btn = document.getElementById('sample-rec-btn');
    btn.textContent = '⏺ Start';
    btn.className = '';
    btn.disabled = false;
  }
}

function drawBufferWaveform(audioBuf) {
  const cv = getTapeCanvas();
  const cx = cv.getContext('2d');
  const w = cv.width, h = cv.height;
  const data = audioBuf.getChannelData(0);
  const step = Math.max(1, Math.floor(data.length / w));
  cx.fillStyle = '#18182a';
  cx.fillRect(0, 0, w, h);
  cx.strokeStyle = 'var(--accent)';
  cx.lineWidth = 1;
  cx.beginPath();
  for (let i = 0; i < w; i++) {
    let min = 1, max = -1;
    for (let j = 0; j < step; j++) {
      const v = data[i * step + j] || 0;
      if (v < min) min = v;
      if (v > max) max = v;
    }
    cx.moveTo(i, (1 + min) * h / 2);
    cx.lineTo(i, (1 + max) * h / 2);
  }
  cx.stroke();
  // Hide playhead after done
  document.getElementById('sm-playhead').style.display = 'none';
}

// Draws a static preview of the tape layout (pre-roll vs rec zone) before recording starts.
// Called when the modal opens in tape mode, and when the user picks a different length.
function drawTapePreview() {
  if (recMode !== 'tape' || tapeActive) return;
  const cv = getTapeCanvas();
  const cx = cv.getContext('2d');
  const w = cv.width, h = cv.height;

  const stepSec      = 60 / bpm / 4;
  const prerollSecs  = 2 * (60 / bpm);
  const recSecs      = sampleBeats * stepSec;
  const totalSecs    = prerollSecs + recSecs;
  const midX         = Math.round(w * (prerollSecs / totalSecs));

  // Background
  cx.fillStyle = '#18182a';
  cx.fillRect(0, 0, w, h);

  // Pre-roll zone — subtle grey tint
  cx.fillStyle = 'rgba(85,85,106,0.10)';
  cx.fillRect(0, 0, midX, h);

  // Rec zone — accent tint
  cx.fillStyle = 'rgba(0,229,200,0.07)';
  cx.fillRect(midX, 0, w - midX, h);

  // Divider line
  cx.strokeStyle = 'rgba(0,229,200,0.35)';
  cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(midX, 0); cx.lineTo(midX, h); cx.stroke();

  // Duration label in rec zone
  cx.fillStyle = 'rgba(0,229,200,0.5)';
  cx.font = 'bold 9px JetBrains Mono, monospace';
  cx.textAlign = 'left';
  cx.textBaseline = 'top';
  const label = recSecs >= 1 ? recSecs.toFixed(1) + 's' : Math.round(recSecs * 1000) + 'ms';
  cx.fillText(label, midX + 6, 5);

  // Update overlays to match preview proportions
  document.getElementById('sm-center-line').style.left  = midX + 'px';
  document.getElementById('sm-rec-tint').style.left     = midX + 'px';
  document.getElementById('sm-rec-tint').style.width    = (w - midX) + 'px';
  document.getElementById('sm-rec-tint').style.opacity  = '';
  document.getElementById('sm-playhead').style.display  = 'none';
}

function updateCropRegion() {
  const cv = getTapeCanvas();
  const w = cv.width;
  const region = document.getElementById('sm-crop-region');

  if (recMode !== 'crop') { region.style.display = 'none'; return; }

  if (!pendingBuffer) {
    // Pre-recording: show placeholder — draw a dim canvas and a proportional ghost region
    const cx = cv.getContext('2d');
    const h = cv.height;
    cx.fillStyle = '#18182a';
    cx.fillRect(0, 0, w, h);

    // Ghost: show crop window as a fraction of the full 2-beat recording length
    const fullSec    = 8 * (60 / bpm / 4);   // sampleBeats fixed at 8 in crop mode
    const windowSec  = cropBeats * (60 / bpm / 4);
    const widthFrac  = Math.min(1, windowSec / fullSec);

    // Draw ghost waveform area
    cx.fillStyle = 'rgba(85,85,106,0.08)';
    cx.fillRect(0, 0, w, h);

    // Crop window ghost
    cx.fillStyle = 'rgba(0,229,200,0.07)';
    cx.fillRect(0, 0, Math.round(w * widthFrac), h);

    // Duration label
    cx.fillStyle = 'rgba(0,229,200,0.4)';
    cx.font = 'bold 9px JetBrains Mono, monospace';
    cx.textAlign = 'left';
    cx.textBaseline = 'top';
    const label = windowSec >= 1 ? windowSec.toFixed(2) + 's' : Math.round(windowSec * 1000) + 'ms';
    cx.fillText(label, 6, 5);

    region.style.display = '';
    region.style.left  = '0%';
    region.style.width = (widthFrac * 100) + '%';
    return;
  }

  // Post-recording: position against actual buffer duration
  const totalSec  = pendingBuffer.duration;
  const windowSec = cropBeats * (60 / bpm / 4);
  cropOffsetSec = Math.max(0, Math.min(totalSec - windowSec, cropOffsetSec));
  const startFrac = cropOffsetSec / totalSec;
  const widthFrac = Math.min(1, windowSec / totalSec);
  region.style.display = '';
  region.style.left  = (startFrac * 100) + '%';
  region.style.width = (widthFrac * 100) + '%';
}

// Drag crop region on canvas
let cropDragging = false;
let cropDragStartX = 0;
let cropDragStartOffset = 0;
const smWrap = document.getElementById('sm-canvas-wrap');
smWrap.addEventListener('pointerdown', (e) => {
  if (recMode !== 'crop' || !pendingBuffer || tapeActive) return;
  cropDragging = true;
  cropDragStartX = e.clientX;
  cropDragStartOffset = cropOffsetSec;
  smWrap.setPointerCapture(e.pointerId);
});
smWrap.addEventListener('pointermove', (e) => {
  if (!cropDragging || !pendingBuffer) return;
  const w = smWrap.offsetWidth;
  const dx = e.clientX - cropDragStartX;
  const dSec = (dx / w) * pendingBuffer.duration;
  cropOffsetSec = cropDragStartOffset + dSec;
  updateCropRegion();
});
smWrap.addEventListener('pointerup', () => { cropDragging = false; });
smWrap.addEventListener('pointercancel', () => { cropDragging = false; });

document.getElementById('sm-confirm').addEventListener('click', () => {
  if (!pendingBuffer || !sampleInstId) return;
  let finalBuffer = pendingBuffer;
  let finalBeats = sampleBeats;

  if (recMode === 'crop') {
    // Trim the buffer to the crop window
    const sampleRate = pendingBuffer.sampleRate;
    const windowSec = cropBeats * (60 / bpm / 4);
    const startSample = Math.floor(cropOffsetSec * sampleRate);
    const windowSamples = Math.floor(windowSec * sampleRate);
    const endSample = Math.min(startSample + windowSamples, pendingBuffer.length);
    const length = endSample - startSample;
    if (length > 0) {
      const trimmed = AC.createBuffer(pendingBuffer.numberOfChannels, length, sampleRate);
      for (let ch = 0; ch < pendingBuffer.numberOfChannels; ch++) {
        trimmed.getChannelData(ch).set(pendingBuffer.getChannelData(ch).subarray(startSample, endSample));
      }
      finalBuffer = trimmed;
      finalBeats = cropBeats;
    }
  }

  instSamples[sampleInstId] = finalBuffer;
  instSampleBeats[sampleInstId] = finalBeats;
  buildFXChain(sampleInstId);
  if (sampleInstId === selectedInst) renderSynthPanel();
  const recBtn = document.getElementById('rec-' + sampleInstId);
  if (recBtn) recBtn.classList.add('sampled');
  closeSampleModal();
});

  function tick(now) {
    const p = Math.min(1, (now - clrStart) / CLR_HOLD_MS);
    clrFill.style.width = (p * 100) + '%';
    if (p < 1) {
      clrRAF = requestAnimationFrame(tick);
    } else {
      clrFired = true;
      clrFill.style.width = '100%';
      Object.keys(notes).forEach(k => notes[k] = []);
      renderAll();
      setTimeout(clrCancel, 180);

  if (this.value.startsWith('u:')) {
    // User preset
    const name = this.value.slice(2);
    loadUserPreset(name);
  } else {
    loadScene(SCENE_PRESETS[+this.value]);
  }
  this.style.color = 'var(--accent)';
});

// ── Inline prompt (replaces window.prompt — blocked on some Android WebViews) ──
function showPresetNamePrompt(onConfirm) {
  const overlay = document.getElementById('inline-prompt');
  const input   = document.getElementById('inline-prompt-input');
  const okBtn   = document.getElementById('inline-prompt-ok');
  const cancelBtn = document.getElementById('inline-prompt-cancel');
  document.getElementById('inline-prompt-label').textContent = 'Preset name';
  input.value = '';
  overlay.style.display = 'flex';
  setTimeout(() => input.focus(), 80);

  function close() {
    overlay.style.display = 'none';
    okBtn.removeEventListener('click', confirm);
    cancelBtn.removeEventListener('click', cancel);
    input.removeEventListener('keydown', onKey);
  }
  function confirm() { close(); onConfirm(input.value); }
  function cancel()  { close(); }
  function onKey(e)  { if (e.key === 'Enter') confirm(); if (e.key === 'Escape') cancel(); }

  okBtn.addEventListener('click', confirm);
  cancelBtn.addEventListener('click', cancel);
  input.addEventListener('keydown', onKey);
}

// ── User preset storage (localStorage) ───────────────────────────
function captureScene(name) {
  return {
    name,
    bpm, steps, swing,
    sp: JSON.parse(JSON.stringify(SP)),
    notes: Object.fromEntries(
      Object.entries(notes).map(([k, v]) => [k, v.map(n => ({...n}))])
    ),
  };
}

async function saveUserPreset() {
  // Use inline prompt UI instead of window.prompt (blocked in some Android WebViews)
  showPresetNamePrompt(async (name) => {
    if (!name || !name.trim()) return;
    const scene = captureScene(name.trim());
    try {
      localStorage.setItem('preset:' + name.trim(), JSON.stringify(scene));
      addUserPresetOption(name.trim());
      setTimeout(() => {
        sceneSelect.value = 'u:' + name.trim();
        sceneSelect.style.color = 'var(--accent)';
      }, 0);
    } catch(e) { console.error('Save preset failed', e); }
  });
}

async function loadUserPreset(name) {
  try {
    const raw = localStorage.getItem('preset:' + name);
    if (!raw) return;
    loadScene(JSON.parse(raw));
  } catch(e) { console.error('Load preset failed', e); }
}

function addUserPresetOption(name) {
  // Avoid duplicates
  if (sceneSelect.querySelector(`option[value="u:${CSS.escape(name)}"]`) ||
      sceneSelect.querySelector(`option[value="u:${name}"]`)) return;
  // Ensure user optgroup exists
  let grp = sceneSelect.querySelector('optgroup[label="My Presets"]');
  if (!grp) {
    grp = document.createElement('optgroup');
    grp.label = 'My Presets';
    sceneSelect.appendChild(grp);
  }
  const opt = document.createElement('option');
  opt.value = 'u:' + name;
  opt.textContent = name;
  grp.appendChild(opt);
  console.log('Added preset option:', name, '→ total options:', sceneSelect.options.length);
  return opt;
}

async function loadAllUserPresets() {
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('preset:')) {
        addUserPresetOption(key.replace('preset:', ''));
      }
    }
  } catch(e) { console.log('localStorage not available:', e.message); }
}
loadAllUserPresets();

document.getElementById('save-preset-item').addEventListener('click', () => {

// ── Master FX modal ───────────────────────────────────────────────
function openMasterFX() {
  const modal = document.getElementById('master-fx-modal');
  modal.style.display = 'flex';

  const fmtDb  = v => (v >= 0 ? '+' : '') + (+v).toFixed(1) + 'dB';
  const fmtPct = v => Math.round(v * 100) + '%';

  function fmtMFX(key, val) {
    if (key === 'eqLow' || key === 'eqMid' || key === 'eqHigh') return (val >= 0 ? '+' : '') + (+val).toFixed(1) + 'dB';
    if (key === 'compThresh') return (+val).toFixed(0) + 'dB';
    if (key === 'reverbDecay') return Math.round(val * 100) + '%';
    if (key === 'volume') return Math.round(val * 100) + '%';
    return Math.round(val * 100) + '%';
  }

  // Populate all sliders and their labels
  modal.querySelectorAll('[data-mfx]').forEach(inp => {
    const key = inp.dataset.mfx;
    inp.value = masterFXP[key];
    const lbl = document.getElementById('mfxv-' + key);
    if (lbl) lbl.textContent = fmtMFX(key, masterFXP[key]);
  });

  // Active states for toggles
  modal.querySelectorAll('.fx-time-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.time === masterFXP.delayTime));
  modal.querySelectorAll('[data-mfxir]').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.mfxir === masterFXP.reverbType));
  modal.querySelectorAll('[data-mfxcomp]').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.mfxcomp === masterFXP.comp));

  // Slider input handler — works for both horizontal and vertical sliders
  modal.querySelectorAll('[data-mfx]').forEach(inp => {
    inp.oninput = function() {
      const key = this.dataset.mfx;
      masterFXP[key] = +this.value;
      applyMasterFX();
      const lbl = document.getElementById('mfxv-' + key);
      if (lbl) lbl.textContent = fmtMFX(key, +this.value);
    };
  });

  // Delay time buttons
  modal.querySelectorAll('.fx-time-btn').forEach(btn => {
    btn.onclick = () => {
      masterFXP.delayTime = btn.dataset.time;
      applyMasterFX();
      modal.querySelectorAll('.fx-time-btn').forEach(b =>
        b.classList.toggle('active', b === btn));
    };
  });

  // Reverb type
  modal.querySelectorAll('[data-mfxir]').forEach(btn => {
    btn.onclick = () => {
      masterFXP.reverbType = btn.dataset.mfxir;
      applyMasterFX();
      modal.querySelectorAll('[data-mfxir]').forEach(b =>
        b.classList.toggle('active', b === btn));
    };
  });

  // Comp preset
  modal.querySelectorAll('[data-mfxcomp]').forEach(btn => {
    btn.onclick = () => {
      masterFXP.comp = btn.dataset.mfxcomp;
      applyMasterFX();
      modal.querySelectorAll('[data-mfxcomp]').forEach(b =>
        b.classList.toggle('active', b === btn));
    };
  });
}

document.getElementById('master-fx-item').addEventListener('click', () => {
  gearMenu.classList.remove('open');
  gearBtn.classList.remove('active');
  openMasterFX();
});

document.getElementById('master-fx-close').addEventListener('click', () => {
  document.getElementById('master-fx-modal').style.display = 'none';
});

  Object.keys(ctxs).forEach(k => delete ctxs[k]);
  renderAll();
});
